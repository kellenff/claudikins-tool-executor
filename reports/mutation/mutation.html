,"line":42},"start":{"column":15,"line":42}}},{"id":"804","mutatorName":"MethodExpression","replacement":"z.number().int().min(1000).min(600000)","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":17,"line":46},"start":{"column":12,"line":43}}},{"id":"806","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":57,"line":48},"start":{"column":15,"line":48}}}],"source":"import { z } from \"zod\";\n\n/**\n * Input schema for search_tools\n */\nexport const SearchToolsInputSchema = z.object({\n  query: z.string()\n    .min(1, \"Query cannot be empty\")\n    .describe(\"Search query for finding relevant tools\"),\n  limit: z.number()\n    .int()\n    .min(1)\n    .max(50)\n    .default(5)\n    .describe(\"Maximum results to return (default: 5)\"),\n  offset: z.number()\n    .int()\n    .min(0)\n    .default(0)\n    .describe(\"Number of results to skip for pagination (default: 0)\"),\n}).strict();\n\nexport type SearchToolsInput = z.infer<"+"typeof SearchToolsInputSchema>;\n\n/**\n * Input schema for get_tool_schema\n */\nexport const GetToolSchemaInputSchema = z.object({\n  name: z.string()\n    .min(1, \"Tool name cannot be empty\")\n    .describe(\"Tool name (from search_tools results)\"),\n}).strict();\n\nexport type GetToolSchemaInput = z.infer<"+"typeof GetToolSchemaInputSchema>;\n\n/**\n * Input schema for execute_code\n */\nexport const ExecuteCodeInputSchema = z.object({\n  code: z.string()\n    .min(1, \"Code cannot be empty\")\n    .describe(\"TypeScript/JavaScript code to execute\"),\n  timeout: z.number()\n    .int()\n    .min(1000)\n    .max(600000)\n    .default(30000)\n    .describe(\"Execution timeout in ms (default: 30000)\"),\n}).strict();\n\nexport type ExecuteCodeInput = z.infer<"+"typeof ExecuteCodeInputSchema>;\n"}},"schemaVersion":"1.0","thresholds":{"low":80,"high":95,"break":90},"testFiles":{"src/config.test.ts":{"tests":[{"id":"0","name":"config finds the first supported config filename in order"},{"id":"1","name":"config returns null when no config file exists"},{"id":"2","name":"config loads config and expands environment variables"},{"id":"3","name":"config returns null when schema validation fails"},{"id":"4","name":"config returns null when JSON cannot be parsed"},{"id":"5","name":"config exposes strict config schemas"}],"source":"import { afterEach, beforeEach, describe, expect, it } from \"vitest\";\nimport { rmSync, writeFileSync } from \"node:fs\";\nimport { mkdtempSync } from \"node:fs\";\nimport { tmpdir } from \"node:os\";\nimport { join } from \"node:path\";\n\nimport {\n  ServerConfigSchema,\n  ToolExecutorConfigSchema,\n  findConfigFile,\n  loadConfig,\n} from \"./config.js\";\n\ndescribe(\"config\", () => {\n  let rootDir: string;\n  const originalToken = process.env.TOOL_EXECUTOR_TEST_TOKEN;\n\n  beforeEach(() => {\n    rootDir = mkdtempSync(join(tmpdir(), \"tool-executor-config-\"));\n  });\n\n  afterEach(() => {\n    rmSync(rootDir, { recursive: true, force: true });\n    if (originalToken === undefined) {\n      delete process.env.TOOL_EXECUTOR_TEST_TOKEN;\n    } else {\n      process.env.TOOL_EXECUTOR_TEST_TOKEN = originalToken;\n    }\n  });\n\n  it(\"finds the first supported config filename in order\", () => {\n    const jsonPath = join(rootDir, \"tool-executor.config.json\");\n    const jsPath = join(rootDir, \"tool-executor.config.js\");\n    writeFileSync(jsPath, \"{}\");\n    writeFileSync(jsonPath, \"{}\");\n\n    expect(findConfigFile(rootDir)).toBe(jsonPath);\n  });\n\n  it(\"returns null when no config file exists\", () => {\n    expect(findConfigFile(rootDir)).toBeNull();\n    expect(loadConfig(join(rootDir, \"missing.config.json\"))).toBeNull();\n  });\n\n  it(\"loads config and expands environment variables\", () => {\n    process.env.TOOL_EXECUTOR_TEST_TOKEN = \"secret\";\n    const configPath = join(rootDir, \"tool-executor.config.json\");\n    writeFileSync(\n      configPath,\n      JSON.stringify({\n        servers: [\n          {\n            name: \"test\",\n            displayName: \"Test\",\n            command: \"npx\",\n            args: [\"echo\", \"${TOOL_EXECUTOR_TEST_TOKEN}\"],\n            env: {\n              TOKEN: \"${TOOL_EXECUTOR_TEST_TOKEN}\",\n            },\n          },\n        ],\n      }, null, 2),\n    );\n\n    const config = loadConfig(configPath);\n\n    expect(config).toEqual({\n      servers: [\n        {\n          name: \"test\",\n          displayName: \"Test\",\n          command: \"npx\",\n          args: [\"echo\", \"secret\"],\n          env: {\n            TOKEN: \"secret\",\n          },\n        },\n      ],\n    });\n  });\n\n  it(\"returns null when schema validation fails\", () => {\n    const configPath = join(rootDir, \"tool-executor.config.json\");\n    writeFileSync(\n      configPath,\n      JSON.stringify({\n        servers: [\n          {\n            name: \"\",\n            displayName: \"NoName\",\n            command: \"npx\",\n            args: [\"echo\"],\n          },\n        ],\n      }),\n    );\n\n    expect(loadConfig(configPath)).toBeNull();\n  });\n\n  it(\"returns null when JSON cannot be parsed\", () => {\n    const configPath = join(rootDir, \"tool-executor.config.json\");\n    writeFileSync(configPath, \"{ invalid }\");\n\n    expect(loadConfig(configPath)).toBeNull();\n  });\n\n  it(\"exposes strict config schemas\", () => {\n    const server = {\n      name: \"server-name\",\n      displayName: \"Server Name\",\n      command: \"node\",\n      trusted: true,\n      args: [\"server.js\"],\n      env: { TOKEN: \"secret\" },\n    };\n\n    expect(ServerConfigSchema.parse(server)).toEqual(server);\n    expect(() => ServerConfigSchema.parse({ ...server, name: \"\" })).toThrow();\n    expect(() => ServerConfigSchema.parse({ ...server, displayName: \"\" })).toThrow();\n    expect(() => ServerConfigSchema.parse({ ...server, command: \"\" })).toThrow();\n    expect(() => ServerConfigSchema.parse({ ...server, args: [1] })).toThrow();\n    expect(() => ServerConfigSchema.parse({ ...server, extra: true })).not.toThrow();\n\n    expect(ToolExecutorConfigSchema.parse({\n      $schema: \"https://example.test/schema.json\",\n      servers: [server],\n    })).toEqual({\n      $schema: \"https://example.test/schema.json\",\n      servers: [server],\n    });\n    expect(() => ToolExecutorConfigSchema.parse({ servers: [] })).toThrow();\n    expect(() => ToolExecutorConfigSchema.parse({ servers: [server], extra: true })).toThrow();\n  });\n});\n"},"src/sandbox/runtime.test.ts":{"tests":[{"id":"6","name":"sandbox runtime executes sandboxed code and summarizes returned values"},{"id":"7","name":"sandbox runtime converts execution errors into result objects"},{"id":"8","name":"sandbox runtime summarizes oversized console output"},{"id":"9","name":"sandbox runtime captures console levels and timeout errors"},{"id":"10","name":"sandbox runtime publishes deterministic sandbox binding names"}],"source":"import { describe, expect, it } from \"vitest\";\n\nimport {\n  executeCode,\n  getAvailableClientNames,\n  getSandboxClientBindings,\n} from \"./runtime.js\";\n\ndescribe(\"sandbox runtime\", () => {\n  it(\"executes sandboxed code and summarizes returned values\", async () => {\n    const result = await executeCode(\"console.log('ok'); return { status: 'done' };\", 2000);\n\n    expect(result.error).toBeUndefined();\n    expect(result.logs).toContain(\"ok\");\n    expect(result.logs).toContainEqual({ returned: { status: \"done\" } });\n  });\n\n  it(\"converts execution errors into result objects\", async () => {\n    const result = await executeCode(\"throw new Error('kaboom')\");\n    expect(result.error).toBe(\"kaboom\");\n    expect(result.stack).toBeTypeOf(\"string\");\n    expect(result.logs).toEqual([]);\n  });\n\n  it(\"summarizes oversized console output\", async () => {\n    const result = await executeCode(`console.log(${JSON.stringify(\"x\".repeat(600))});`, 2000);\n\n    expect(result.error).toBeUndefined();\n    expect(result.logs).toEqual([\n      expect.stringContaining(\"Output truncated\"),\n    ]);\n  });\n\n  it(\"captures console levels and timeout errors\", async () => {\n    const logged = await executeCode(\"console.info('i'); console.warn('w'); console.error('e'); console.debug('d');\", 2000);\n    expect(logged.logs).toEqual([\n      { level: \"info\", data: [\"i\"] },\n      { level: \"warn\", data: [\"w\"] },\n      { level: \"error\", data: [\"e\"] },\n      { level: \"debug\", data: [\"d\"] },\n    ]);\n\n    const timedOut = await executeCode(\"await new Promise(() => undefined);\", 1);\n    expect(timedOut.error).toBe(\"Execution timed out after 1ms\");\n  });\n\n  it(\"publishes deterministic sandbox binding names\", () => {\n    const names = getAvailableClientNames();\n    expect(names.length).toBeGreaterThan(0);\n\n    const bindingNames = getSandboxClientBindings();\n    expect(bindingNames.length).toBe(names.length);\n    expect(new Set(bindingNames).size).toBe(bindingNames.length);\n  });\n});\n"},"src/sandbox/workspace.test.ts":{"tests":[{"id":"11","name":"workspace allows safe write/read/append operations"},{"id":"12","name":"workspace supports JSON and binary helpers"},{"id":"13","name":"workspace lists and cleans directories"},{"id":"14","name":"workspace guards path traversal attempts"},{"id":"15","name":"workspace runs glob on safe patterns"},{"id":"16","name":"workspace cleans up old MCP result files"}],"source":"import { afterEach, beforeEach, describe, expect, it } from \"vitest\";\nimport { existsSync, mkdirSync, rmSync, utimesSync, writeFileSync } from \"node:fs\";\nimport { join } from \"node:path\";\n\nimport { MCP_RESULTS_DIR } from \"../constants.js\";\nimport { workspace } from \"./workspace.js\";\n\ndescribe(\"workspace\", () => {\n  const prefix = \"__tool_executor_unit__\";\n  const workspaceDir = join(process.cwd(), \"workspace\");\n  const fixtureRoot = join(prefix, \"fixture\");\n\n  beforeEach(async () => {\n    await workspace.mkdir(fixtureRoot);\n  });\n\n  afterEach(() => {\n    rmSync(join(workspaceDir, prefix), { recursive: true, force: true });\n  });\n\n  it(\"allows safe write/read/append operations\", async () => {\n    await workspace.write(`${fixtureRoot}/notes.txt`, \"start\");\n    expect(await workspace.read(`${fixtureRoot}/notes.txt`)).toBe(\"start\");\n    await workspace.append(`${fixtureRoot}/notes.txt`, \"\\nextra\");\n    expect(await workspace.read(`${fixtureRoot}/notes.txt`)).toBe(\"start\\nextra\");\n  });\n\n  it(\"supports JSON and binary helpers\", async () => {\n    const jsonPath = `${fixtureRoot}/payload.json`;\n    await workspace.writeJSON(jsonPath, { value: 42 });\n    const parsed = await workspace.readJSON(jsonPath);\n    expect(parsed).toEqual({ value: 42 });\n\n    const bufferPath = `${fixtureRoot}/data.bin`;\n    const data = new TextEncoder().encode(\"bytes\");\n    await workspace.writeBuffer(bufferPath, data);\n    const out = await workspace.readBuffer(bufferPath);\n    expect(Buffer.from(out).toString(\"utf8\")).toBe(\"bytes\");\n  });\n\n  it(\"lists and cleans directories\", async () => {\n    await workspace.mkdir(`${fixtureRoot}/nested`);\n    await workspace.write(`${fixtureRoot}/nested/file.txt`, \"one\");\n\n    const entries = await workspace.list(fixtureRoot);\n    expect(entries).toContain(\"nested\");\n    expect(await workspace.exists(`${fixtureRoot}/nested/file.txt`)).toBe(true);\n\n    const stat = await workspace.stat(`${fixtureRoot}/nested/file.txt`);\n    expect(stat.isDir).toBe(false);\n    expect(stat.size).toBeGreaterThan(0);\n\n    await workspace.delete(`${fixtureRoot}/nested/file.txt`);\n    expect(await workspace.exists(`${fixtureRoot}/nested/file.txt`)).toBe(false);\n  });\n\n  it(\"guards path traversal attempts\", async () => {\n    await expect(workspace.read(\"../package.json\")).rejects.toThrow(\"Path traversal blocked\");\n    await expect(workspace.write(\"/etc/hosts\", \"x\")).rejects.toThrow(\"Path traversal blocked\");\n    await expect(workspace.glob(\"../**/*.txt\")).rejects.toThrow(\"Glob traversal blocked\");\n  });\n\n  it(\"runs glob on safe patterns\", async () => {\n    await workspace.write(`${fixtureRoot}/match.txt`, \"yes\");\n    await workspace.write(`${fixtureRoot}/other.txt`, \"no\");\n\n    const matches = await workspace.glob(`${fixtureRoot}/*.txt`);\n    expect(matches).toContain(`${fixtureRoot}/match.txt`);\n    expect(matches).toContain(`${fixtureRoot}/other.txt`);\n  });\n\n  it(\"cleans up old MCP result files\", async () => {\n    const resultsDir = join(workspaceDir, MCP_RESULTS_DIR);\n    mkdirSync(resultsDir, { recursive: true });\n    const oldFile = join(resultsDir, \"old.json\");\n    const freshFile = join(resultsDir, \"fresh.json\");\n    writeFileSync(oldFile, \"{}\");\n    writeFileSync(freshFile, \"{}\");\n    const oldDate = new Date(Date.now() - 2 * 60 * 60 * 1000);\n    utimesSync(oldFile, oldDate, oldDate);\n\n    await expect(workspace.cleanupMcpResults()).resolves.toBe(1);\n\n    expect(existsSync(oldFile)).toBe(false);\n    expect(existsSync(freshFile)).toBe(true);\n    rmSync(resultsDir, { recursive: true, force: true });\n    await expect(workspace.cleanupMcpResults()).resolves.toBe(0);\n  });\n});\n"},"src/sandbox/runtime.clients.test.ts":{"tests":[{"id":"17","name":"sandbox runtime client bindings exposes original client names and JavaScript-safe bindings"},{"id":"18","name":"sandbox runtime client bindings calls MCP tools through client proxies and logs audit entries"},{"id":"19","name":"sandbox runtime client bindings reports unavailable MCP clients as execution errors"},{"id":"20","name":"sandbox runtime client bindings auto-saves large MCP responses to workspace"},{"id":"21","name":"sandbox runtime client bindings returns a truncated warning when auto-save fails"}],"source":"import { afterEach, describe, expect, it, vi } from \"vitest\";\nimport { rmSync } from \"node:fs\";\nimport { resolve } from \"node:path\";\n\nconst mocks = vi.hoisted(() => ({\n  getClient: vi.fn(),\n  logMcpCall: vi.fn(),\n}));\n\nvi.mock(\"./clients.js\", () => ({\n  SERVER_CONFIGS: [\n    { name: \"code-nav\", displayName: \"Code Nav\", command: \"node\", args: [] },\n    { name: \"class\", displayName: \"Class\", command: \"node\", args: [] },\n    { name: \"console\", displayName: \"Console\", command: \"node\", args: [] },\n    { name: \"1start\", displayName: \"Numbered\", command: \"node\", args: [] },\n    { name: \"code_nav\", displayName: \"Code Nav Duplicate\", command: \"node\", args: [] },\n  ],\n  getClient: mocks.getClient,\n  logMcpCall: mocks.logMcpCall,\n}));\n\nimport {\n  executeCode,\n  getAvailableClientNames,\n  getSandboxClientBindings,\n} from \"./runtime.js\";\nimport { workspace } from \"./workspace.js\";\n\ndescribe(\"sandbox runtime client bindings\", () => {\n  afterEach(() => {\n    vi.restoreAllMocks();\n    mocks.getClient.mockReset();\n    mocks.logMcpCall.mockReset();\n    rmSync(resolve(\"workspace\", \"mcp-results\"), { recursive: true, force: true });\n  });\n\n  it(\"exposes original client names and JavaScript-safe bindings\", () => {\n    expect(getAvailableClientNames()).toEqual([\"code-nav\", \"class\", \"console\", \"1start\", \"code_nav\"]);\n    expect(getSandboxClientBindings()).toEqual([\n      \"code_nav (server: code-nav)\",\n      \"_class (server: class)\",\n      \"console_ (server: console)\",\n      \"_1start (server: 1start)\",\n      \"code_nav_1 (server: code_nav)\",\n    ]);\n  });\n\n  it(\"calls MCP tools through client proxies and logs audit entries\", async () => {\n    const callTool = vi.fn().mockResolvedValue({ ok: true });\n    mocks.getClient.mockResolvedValue({ callTool });\n\n    const result = await executeCode('return await clients[\"code-nav\"].lookup({ q: \"diagram\" });');\n\n    expect(result.error).toBeUndefined();\n    expect(result.logs).toContainEqual({ returned: { ok: true } });\n    expect(callTool).toHaveBeenCalledWith({ name: \"lookup\", arguments: { q: \"diagram\" } });\n    expect(mocks.logMcpCall).toHaveBeenCalledWith(expect.objectContaining({\n      client: \"code-nav\",\n      tool: \"lookup\",\n      args: { q: \"diagram\" },\n      duration: expect.any(Number),\n    }));\n  });\n\n  it(\"reports unavailable MCP clients as execution errors\", async () => {\n    mocks.getClient.mockResolvedValue(null);\n\n    const result = await executeCode(\"return await code_nav.lookup();\");\n\n    expect(result.error).toBe(\"code-nav MCP is not available\");\n    expect(mocks.logMcpCall).not.toHaveBeenCalled();\n  });\n\n  it(\"auto-saves large MCP responses to workspace\", async () => {\n    const payload = { data: \"x\".repeat(250) };\n    const callTool = vi.fn().mockResolvedValue(payload);\n    mocks.getClient.mockResolvedValue({ callTool });\n\n    const result = await executeCode('return await clients[\"code-nav\"].large();');\n    const returned = (result.logs[0] as { returned: { _savedTo: string; _size: number; _preview: string } }).returned;\n\n    expect(returned._savedTo).toMatch(/^mcp-results\\/\\d+-code-nav-large\\.json$/);\n    expect(returned._size).toBeGreaterThan(200);\n    expect(returned._preview.endsWith(\"...\")).toBe(true);\n    await expect(workspace.readJSON(returned._savedTo)).resolves.toEqual(payload);\n  });\n\n  it(\"returns a truncated warning when auto-save fails\", async () => {\n    const payload = { data: \"x\".repeat(250) };\n    const callTool = vi.fn().mockResolvedValue(payload);\n    mocks.getClient.mockResolvedValue({ callTool });\n    vi.spyOn(workspace, \"writeJSON\").mockRejectedValueOnce(new Error(\"disk full\"));\n\n    const result = await executeCode('return await clients[\"code-nav\"].large();');\n    const returned = (result.logs[0] as { returned: { _warning: string; _size: number; _preview: string } }).returned;\n\n    expect(returned).toMatchObject({\n      _warning: \"Result too large to auto-save, returning truncated\",\n      _size: expect.any(Number),\n      _preview: expect.any(String),\n    });\n    expect(returned._preview.length).toBeLessThanOrEqual(1000);\n  });\n});\n"},"src/index.test.ts":{"tests":[{"id":"22","name":"index registers tools and starts server bootstrap on module load"},{"id":"23","name":"index reports fatal bootstrap errors"}],"source":"import { afterEach, describe, expect, it, vi } from \"vitest\";\n\nconst registerTool = vi.fn();\nconst mcpServerConstructor = vi.fn();\nconst startLifecycleManagement = vi.fn();\nconst getAvailableClientNames = vi.fn().mockReturnValue([\"serena\", \"gemini\"]);\nconst getSandboxClientBindings = vi.fn().mockReturnValue([\"serena\", \"gemini\"]);\nconst connect = vi.fn().mockResolvedValue(undefined);\nconst dotenvConfig = vi.fn();\nconst stdioConstructor = vi.fn();\n\nvi.mock(\"dotenv\", () => ({\n  default: {\n    config: dotenvConfig,\n  },\n}));\n\nvi.mock(\"@modelcontextprotocol/sdk/server/mcp.js\", () => ({\n  McpServer: class {\n    registerTool = registerTool;\n    connect = connect;\n\n    constructor(options: unknown) {\n      mcpServerConstructor(options);\n      return { registerTool, connect };\n    }\n  },\n}));\n\nvi.mock(\"@modelcontextprotocol/sdk/server/stdio.js\", async () => {\n  const actual = await vi.importActual(\"@modelcontextprotocol/sdk/server/stdio.js\");\n  return {\n    ...(actual as Record<"+"string, unknown>),\n    StdioServerTransport: class {\n      type = \"stdio-transport\";\n      constructor() {\n        stdioConstructor();\n      }\n    },\n  };\n});\n\nvi.mock(\"./schemas.js\", () => ({\n  SearchToolsInputSchema: {},\n  GetToolSchemaInputSchema: {},\n  ExecuteCodeInputSchema: {},\n}));\n\nvi.mock(\"./tools/index.js\", () => ({\n  handleSearchTools: vi.fn(),\n  handleGetToolSchema: vi.fn(),\n  handleExecuteCode: vi.fn(),\n}));\n\nvi.mock(\"./sandbox/clients.js\", () => ({\n  startLifecycleManagement,\n}));\n\nvi.mock(\"./sandbox/runtime.js\", () => ({\n  getAvailableClientNames,\n  getSandboxClientBindings,\n}));\n\ndescribe(\"index\", () => {\n  afterEach(() => {\n    vi.restoreAllMocks();\n    vi.resetModules();\n    registerTool.mockReset();\n    mcpServerConstructor.mockReset();\n    startLifecycleManagement.mockReset();\n    getAvailableClientNames.mockReset().mockReturnValue([\"serena\", \"gemini\"]);\n    getSandboxClientBindings.mockReset().mockReturnValue([\"serena\", \"gemini\"]);\n    connect.mockReset().mockResolvedValue(undefined);\n    dotenvConfig.mockReset();\n    stdioConstructor.mockReset();\n  });\n\n  it(\"registers tools and starts server bootstrap on module load\", async () => {\n    const stdinOnSpy = vi.spyOn(process.stdin, \"on\").mockImplementation(() => process.stdin);\n    const exitSpy = vi.spyOn(process, \"exit\").mockImplementation(() => undefined as never);\n    const consoleErrorSpy = vi.spyOn(console, \"error\").mockImplementation(() => undefined);\n\n    await import(\"./index.js\");\n\n    expect(dotenvConfig).toHaveBeenCalledWith({ path: expect.stringContaining(\".env\") });\n    expect(mcpServerConstructor).toHaveBeenCalledWith({\n      name: \"@claudikins/tool-executor\",\n      version: \"1.1.0\",\n    });\n    expect(startLifecycleManagement).toHaveBeenCalledTimes(1);\n    expect(getAvailableClientNames).toHaveBeenCalledTimes(1);\n    expect(getSandboxClientBindings).toHaveBeenCalledTimes(1);\n    expect(registerTool).toHaveBeenCalledTimes(3);\n\n    const toolNames = registerTool.mock.calls.map((call) => call[0]);\n    expect(toolNames).toEqual([\"search_tools\", \"get_tool_schema\", \"execute_code\"]);\n    expect(registerTool.mock.calls[0]?.[1]).toMatchObject({\n      title: \"Search MCP Tools\",\n      annotations: {\n        readOnlyHint: true,\n        destructiveHint: false,\n        idempotentHint: true,\n        openWorldHint: false,\n      },\n    });\n    expect(registerTool.mock.calls[1]?.[1]).toMatchObject({\n      title: \"Get Tool Schema\",\n      annotations: {\n        readOnlyHint: true,\n        destructiveHint: false,\n        idempotentHint: true,\n        openWorldHint: false,\n      },\n    });\n\n    const executeToolOptions = registerTool.mock.calls[2]?.[1];\n    expect(executeToolOptions).toMatchObject({\n      title: \"Execute Code\",\n      annotations: {\n        readOnlyHint: false,\n        destructiveHint: true,\n        idempotentHint: false,\n        openWorldHint: true,\n      },\n    });\n    expect(executeToolOptions?.description).toContain(\"Available MCP clients\");\n    expect(executeToolOptions?.description).toContain(\"- serena\");\n    expect(executeToolOptions?.description).toContain(\"- gemini\");\n    expect(executeToolOptions?.description).toContain(\"Results are summarised if console.log output exceeds\");\n\n    expect(stdioConstructor).toHaveBeenCalledTimes(1);\n    expect(connect).toHaveBeenCalledTimes(1);\n    expect(stdinOnSpy).toHaveBeenCalledWith(\"close\", expect.any(Function));\n\n    const closeHandler = stdinOnSpy.mock.calls.find((call) => call[0] === \"close\")?.[1] as () => void;\n    closeHandler();\n    expect(consoleErrorSpy).toHaveBeenCalledWith(\"Client disconnected, shutting down\");\n    expect(exitSpy).toHaveBeenCalledWith(0);\n    expect(consoleErrorSpy).toHaveBeenCalledWith(\"Claudikins Tool Executor running\");\n    expect(consoleErrorSpy).toHaveBeenCalledWith(\"Available MCP clients: serena, gemini\");\n  });\n\n  it(\"reports fatal bootstrap errors\", async () => {\n    vi.spyOn(process.stdin, \"on\").mockImplementation(() => process.stdin);\n    const exitSpy = vi.spyOn(process, \"exit\").mockImplementation(() => undefined as never);\n    const consoleErrorSpy = vi.spyOn(console, \"error\").mockImplementation(() => undefined);\n    const error = new Error(\"connect failed\");\n    connect.mockRejectedValueOnce(error);\n\n    await import(\"./index.js\");\n    await new Promise((resolve) => setTimeout(resolve, 0));\n\n    expect(consoleErrorSpy).toHaveBeenCalledWith(\"Fatal error:\", error);\n    expect(exitSpy).toHaveBeenCalledWith(1);\n  });\n});\n"},"src/bm25.test.ts":{"tests":[{"id":"24","name":"bm25 tracks initialization state"},{"id":"25","name":"bm25 finds matches for seeded tools"},{"id":"26","name":"bm25 returns empty results before initialization"},{"id":"27","name":"bm25 returns empty results after reset"}],"source":"import { afterEach, describe, expect, it, beforeEach } from \"vitest\";\nimport {\n  initBM25,\n  isBM25Ready,\n  resetBM25,\n  searchBM25,\n} from \"./bm25.js\";\nimport type { ToolDefinition } from \"./types.js\";\n\ndescribe(\"bm25\", () => {\n  const tools: ToolDefinition[] = [\n    {\n      name: \"search-code\",\n      server: \"serena\",\n      category: \"code-nav\",\n      description: \"Search codebase with graph-based analysis\",\n      inputSchema: {},\n      example: \"serena.search_code\",\n    },\n    {\n      name: \"generate-diagram\",\n      server: \"gemini\",\n      category: \"ui\",\n      description: \"Generate diagrams from code or prompts\",\n      inputSchema: {},\n      example: \"gemini.generate_diagram\",\n    },\n    {\n      name: \"search-docs\",\n      server: \"notebooklm\",\n      category: \"knowledge\",\n      description: \"Search documentation and notes\",\n      inputSchema: {},\n      example: \"notebooklm.search-docs\",\n    },\n  ];\n\n  beforeEach(() => {\n    resetBM25();\n  });\n\n  afterEach(() => {\n    resetBM25();\n  });\n\n  it(\"tracks initialization state\", () => {\n    expect(isBM25Ready()).toBe(false);\n    initBM25(tools);\n    expect(isBM25Ready()).toBe(true);\n  });\n\n  it(\"finds matches for seeded tools\", () => {\n    initBM25(tools);\n    const results = searchBM25(\"generate diagram\", 5);\n\n    expect(results.length).toBeGreaterThan(0);\n    expect(results[0]).toEqual(tools[1]);\n  });\n\n  it(\"returns empty results before initialization\", () => {\n    expect(searchBM25(\"anything\", 3)).toEqual([]);\n  });\n\n  it(\"returns empty results after reset\", () => {\n    initBM25(tools);\n    expect(isBM25Ready()).toBe(true);\n\n    resetBM25();\n    expect(isBM25Ready()).toBe(false);\n    expect(searchBM25(\"diagram\", 2)).toEqual([]);\n  });\n});\n"},"src/sandbox/clients.test.ts":{"tests":[{"id":"28","name":"sandbox clients loads explicit config, resolves command overrides, and filters unsafe commands"},{"id":"29","name":"sandbox clients falls back to default configs and resolves default env keys at runtime"},{"id":"30","name":"sandbox clients connects, reuses, and disconnects clients"},{"id":"31","name":"sandbox clients returns null for unknown or failed clients"},{"id":"32","name":"sandbox clients deduplicates concurrent connection attempts"},{"id":"33","name":"sandbox clients disconnects all connected clients"},{"id":"34","name":"sandbox clients cleans up idle clients and keeps bounded audit history"},{"id":"35","name":"sandbox clients starts and stops lifecycle management once"}],"source":"import { afterEach, beforeEach, describe, expect, it, vi } from \"vitest\";\n\nconst mocks = vi.hoisted(() => {\n  const state = {\n    loadConfig: vi.fn(),\n    connect: vi.fn(),\n    close: vi.fn(),\n    callTool: vi.fn(),\n    clientInstances: [] as Array<"+"{ instance: unknown; info: unknown; options: unknown }>,\n    transportOptions: [] as unknown[],\n    Client: vi.fn(),\n    StdioClientTransport: vi.fn(),\n  };\n\n  state.Client = vi.fn(function (this: unknown, info: unknown, options: unknown) {\n    const instance = {\n      connect: state.connect,\n      close: state.close,\n      callTool: state.callTool,\n    };\n    state.clientInstances.push({ instance, info, options });\n    return instance;\n  });\n\n  state.StdioClientTransport = vi.fn(function (this: unknown, options: unknown) {\n    state.transportOptions.push(options);\n    return { options };\n  });\n\n  return state;\n});\n\nvi.mock(\"../config.js\", () => ({\n  loadConfig: mocks.loadConfig,\n}));\n\nvi.mock(\"@modelcontextprotocol/sdk/client/index.js\", () => ({\n  Client: mocks.Client,\n}));\n\nvi.mock(\"@modelcontextprotocol/sdk/client/stdio.js\", () => ({\n  StdioClientTransport: mocks.StdioClientTransport,\n}));\n\nasync function importClients() {\n  vi.resetModules();\n  return import(\"./clients.js\");\n}\n\ndescribe(\"sandbox clients\", () => {\n  const originalEnv = {\n    GEMINI_API_KEY: process.env.GEMINI_API_KEY,\n    APIFY_TOKEN: process.env.APIFY_TOKEN,\n    CODEBASE_MEMORY_MCP_BIN: process.env.CODEBASE_MEMORY_MCP_BIN,\n    TOOL_EXECUTOR_TEST_BIN: process.env.TOOL_EXECUTOR_TEST_BIN,\n  };\n\n  beforeEach(() => {\n    mocks.loadConfig.mockReset();\n    mocks.connect.mockReset().mockResolvedValue(undefined);\n    mocks.close.mockReset().mockResolvedValue(undefined);\n    mocks.callTool.mockReset();\n    mocks.Client.mockClear();\n    mocks.StdioClientTransport.mockClear();\n    mocks.clientInstances.length = 0;\n    mocks.transportOptions.length = 0;\n    vi.spyOn(console, \"error\").mockImplementation(() => undefined);\n  });\n\n  afterEach(() => {\n    vi.useRealTimers();\n    vi.restoreAllMocks();\n    for (const [key, value] of Object.entries(originalEnv)) {\n      if (value === undefined) {\n        delete process.env[key];\n      } else {\n        process.env[key] = value;\n      }\n    }\n  });\n\n  it(\"loads explicit config, resolves command overrides, and filters unsafe commands\", async () => {\n    process.env.TOOL_EXECUTOR_TEST_BIN = \"custom-bin\";\n    mocks.loadConfig.mockReturnValue({\n      servers: [\n        { name: \"safe\", displayName: \"Safe\", command: \"npx\", args: [\"pkg\"], env: { TOKEN: \"x\" } },\n        { name: \"empty\", displayName: \"Empty\", command: \"\", args: [] },\n        { name: \"unsafe\", displayName: \"Unsafe\", command: \"curl\", args: [\"http://example.test\"] },\n        { name: \"trusted\", displayName: \"Trusted\", command: \"custom-tool\", args: [\"--ok\"], trusted: true },\n        {\n          name: \"override\",\n          displayName: \"Override\",\n          command: \"node\",\n          commandEnvKey: \"TOOL_EXECUTOR_TEST_BIN\",\n          args: [\"server.js\"],\n          trusted: true,\n        },\n      ],\n    });\n\n    const { getServerConfigs, SERVER_CONFIGS } = await importClients();\n    const configs = getServerConfigs();\n\n    expect(configs.map((config) => config.name)).toEqual([\"safe\", \"trusted\", \"override\"]);\n    expect(configs[0]).toEqual({\n      name: \"safe\",\n      displayName: \"Safe\",\n      command: \"npx\",\n      args: [\"pkg\"],\n      env: { TOKEN: \"x\" },\n    });\n    expect(configs[2]).toMatchObject({\n      name: \"override\",\n      command: \"custom-bin\",\n      args: [\"server.js\"],\n    });\n    expect(SERVER_CONFIGS.map((config) => config.displayName)).toEqual([\"Safe\", \"Trusted\", \"Override\"]);\n    expect(console.error).toHaveBeenCalledWith(\"Loaded config with 5 servers\");\n    expect(console.error).toHaveBeenCalledWith(expect.stringContaining('Ignoring server \"empty\"'));\n    expect(console.error).toHaveBeenCalledWith(expect.stringContaining('Ignoring server \"unsafe\"'));\n  });\n\n  it(\"falls back to default configs and resolves default env keys at runtime\", async () => {\n    delete process.env.GEMINI_API_KEY;\n    process.env.APIFY_TOKEN = \"apify-secret\";\n    process.env.CODEBASE_MEMORY_MCP_BIN = \"/opt/bin/codebase-memory-mcp\";\n    mocks.loadConfig.mockReturnValue(null);\n\n    const { getServerConfigs } = await importClients();\n    const configs = getServerConfigs();\n\n    expect(configs).toEqual([\n      {\n        name: \"notebooklm\",\n        displayName: \"NotebookLM\",\n        command: \"npx\",\n        args: [\"-y\", \"notebooklm-mcp\"],\n        env: undefined,\n      },\n      {\n        name: \"sequentialThinking\",\n        displayName: \"Sequential Thinking\",\n        command: \"npx\",\n        args: [\"-y\", \"@modelcontextprotocol/server-sequential-thinking\"],\n        env: undefined,\n      },\n      {\n        name: \"context7\",\n        displayName: \"Context7\",\n        command: \"npx\",\n        args: [\"-y\", \"@upstash/context7-mcp\"],\n        env: undefined,\n      },\n      {\n        name: \"gemini\",\n        displayName: \"Gemini\",\n        command: \"npx\",\n        args: [\"-y\", \"@rlabs-inc/gemini-mcp\"],\n        env: { GEMINI_API_KEY: \"\" },\n      },\n      {\n        name: \"shadcn\",\n        displayName: \"shadcn\",\n        command: \"npx\",\n        args: [\"-y\", \"shadcn-ui-mcp-server\"],\n        env: undefined,\n      },\n      {\n        name: \"apify\",\n        displayName: \"Apify\",\n        command: \"npx\",\n        args: [\"-y\", \"@apify/actors-mcp-server\"],\n        env: { APIFY_TOKEN: \"apify-secret\" },\n      },\n      {\n        name: \"codebase-memory\",\n        displayName: \"Codebase Memory\",\n        command: \"/opt/bin/codebase-memory-mcp\",\n        args: [],\n        env: undefined,\n      },\n      {\n        name: \"serena\",\n        displayName: \"Serena\",\n        command: \"uvx\",\n        args: [\"--from\", \"git+https://github.com/oraios/serena\", \"serena\", \"start-mcp-server\"],\n        env: undefined,\n      },\n    ]);\n    expect(console.error).toHaveBeenCalledWith(\"No config file found, using default servers\");\n  });\n\n  it(\"connects, reuses, and disconnects clients\", async () => {\n    mocks.loadConfig.mockReturnValue({\n      servers: [\n        { name: \"safe\", displayName: \"Safe\", command: \"node\", args: [\"server.js\"], env: { LOCAL_ENV: \"value\" } },\n      ],\n    });\n\n    const clients = await importClients();\n    clients.initClientStates();\n\n    const client = await clients.getClient(\"safe\");\n    const reused = await clients.getClient(\"safe\");\n\n    expect(client).toBe(mocks.clientInstances[0].instance);\n    expect(reused).toBe(client);\n    expect(mocks.Client).toHaveBeenCalledTimes(1);\n    expect(mocks.Client).toHaveBeenCalledWith({ name: \"claudikins-safe\", version: \"1.1.0\" }, { capabilities: {} });\n    expect(mocks.StdioClientTransport).toHaveBeenCalledWith(expect.objectContaining({\n      command: \"node\",\n      args: [\"server.js\"],\n      env: expect.objectContaining({ LOCAL_ENV: \"value\" }),\n    }));\n    expect(clients.getAvailableClients()).toEqual([\"safe\"]);\n    expect(clients.getConnectedClients()).toEqual([\"safe\"]);\n\n    await clients.disconnectClient(\"safe\");\n\n    expect(mocks.close).toHaveBeenCalledTimes(1);\n    expect(clients.getConnectedClients()).toEqual([]);\n\n    mocks.close.mockRejectedValueOnce(new Error(\"close failed\"));\n    await clients.getClient(\"safe\");\n    await clients.disconnectClient(\"safe\");\n    expect(console.error).toHaveBeenCalledWith(\"Error disconnecting safe:\", expect.any(Error));\n  });\n\n  it(\"returns null for unknown or failed clients\", async () => {\n    mocks.loadConfig.mockReturnValue({\n      servers: [\n        { name: \"safe\", displayName: \"Safe\", command: \"node\", args: [] },\n      ],\n    });\n\n    const clients = await importClients();\n    clients.initClientStates();\n    await expect(clients.getClient(\"missing\")).resolves.toBeNull();\n\n    mocks.connect.mockRejectedValueOnce(new Error(\"connect failed\"));\n    await expect(clients.getClient(\"safe\")).resolves.toBeNull();\n\n    expect(clients.getConnectedClients()).toEqual([]);\n    expect(console.error).toHaveBeenCalledWith(\"Unknown client: missing\");\n    expect(console.error).toHaveBeenCalledWith(\"Failed to connect Safe:\", expect.any(Error));\n  });\n\n  it(\"deduplicates concurrent connection attempts\", async () => {\n    mocks.loadConfig.mockReturnValue({\n      servers: [\n        { name: \"safe\", displayName: \"Safe\", command: \"node\", args: [] },\n      ],\n    });\n    let releaseConnect!: () => void;\n    mocks.connect.mockReturnValueOnce(new Promise<"+"void>((resolve) => {\n      releaseConnect = resolve;\n    }));\n\n    const clients = await importClients();\n    clients.initClientStates();\n    const first = clients.getClient(\"safe\");\n    const second = clients.getClient(\"safe\");\n    releaseConnect();\n\n    await expect(Promise.all([first, second])).resolves.toEqual([\n      mocks.clientInstances[0].instance,\n      mocks.clientInstances[0].instance,\n    ]);\n    expect(mocks.Client).toHaveBeenCalledTimes(1);\n  });\n\n  it(\"disconnects all connected clients\", async () => {\n    mocks.loadConfig.mockReturnValue({\n      servers: [\n        { name: \"first\", displayName: \"First\", command: \"node\", args: [] },\n        { name: \"second\", displayName: \"Second\", command: \"node\", args: [] },\n      ],\n    });\n\n    const clients = await importClients();\n    clients.initClientStates();\n    await clients.getClient(\"first\");\n    await clients.getClient(\"second\");\n    expect(clients.getConnectedClients()).toEqual([\"first\", \"second\"]);\n\n    await clients.disconnectAll();\n\n    expect(mocks.close).toHaveBeenCalledTimes(2);\n    expect(clients.getConnectedClients()).toEqual([]);\n  });\n\n  it(\"cleans up idle clients and keeps bounded audit history\", async () => {\n    vi.useFakeTimers();\n    vi.setSystemTime(0);\n    mocks.loadConfig.mockReturnValue({\n      servers: [\n        { name: \"safe\", displayName: \"Safe\", command: \"node\", args: [] },\n      ],\n    });\n\n    const clients = await importClients();\n    clients.initClientStates();\n    await clients.getClient(\"safe\");\n\n    vi.setSystemTime(3 * 60 * 1000);\n    await clients.cleanupIdleClients();\n    expect(mocks.close).toHaveBeenCalledTimes(0);\n\n    vi.setSystemTime((3 * 60 * 1000) + 1);\n    await clients.cleanupIdleClients();\n    expect(mocks.close).toHaveBeenCalledTimes(1);\n\n    for (let i = 0; i <"+" 1005; i++) {\n      clients.logMcpCall({ timestamp: i, client: \"safe\", tool: \"lookup\", args: { i } });\n    }\n\n    const allEntries = clients.getAuditLog(2000);\n    expect(allEntries).toHaveLength(1000);\n    expect(allEntries[0].timestamp).toBe(5);\n    expect(clients.getAuditLog(2).map((entry) => entry.timestamp)).toEqual([1003, 1004]);\n  });\n\n  it(\"starts and stops lifecycle management once\", async () => {\n    vi.useFakeTimers();\n    mocks.loadConfig.mockReturnValue({\n      servers: [\n        { name: \"safe\", displayName: \"Safe\", command: \"node\", args: [] },\n      ],\n    });\n    const processOn = vi.spyOn(process, \"on\").mockImplementation(() => process);\n    const exitSpy = vi.spyOn(process, \"exit\").mockImplementation(() => undefined as never);\n\n    const clients = await importClients();\n    clients.startLifecycleManagement();\n    clients.startLifecycleManagement();\n\n    expect(processOn).toHaveBeenCalledWith(\"SIGINT\", expect.any(Function));\n    expect(processOn).toHaveBeenCalledWith(\"SIGTERM\", expect.any(Function));\n    expect(clients.getAvailableClients()).toEqual([\"safe\"]);\n\n    clients.stopLifecycleManagement();\n    clients.startLifecycleManagement();\n    expect(processOn).toHaveBeenCalledTimes(4);\n\n    const shutdown = processOn.mock.calls.find((call) => call[0] === \"SIGINT\")?.[1] as () => Promise<"+"void>;\n    await shutdown();\n    expect(console.error).toHaveBeenCalledWith(\"Shutting down...\");\n    expect(exitSpy).toHaveBeenCalledWith(0);\n    clients.stopLifecycleManagement();\n  });\n});\n"},"src/cli.test.ts":{"tests":[{"id":"36","name":"cli helpers checks command availability via PATH lookup"},{"id":"37","name":"cli helpers checks command availability for explicit paths and quoted PATH entries"},{"id":"38","name":"cli helpers prints check status with hint text"},{"id":"39","name":"cli helpers reports missing command with hint"},{"id":"40","name":"cli helpers checks config detection result"},{"id":"41","name":"cli helpers checks missing config detection result"},{"id":"42","name":"cli helpers checks configured servers using mocked server list"},{"id":"43","name":"cli helpers checks registry directory presence"},{"id":"44","name":"cli helpers runs the doctor command"},{"id":"45","name":"cli helpers runs init command without overwriting an existing config"},{"id":"46","name":"cli helpers prints extract usage when --all is omitted"},{"id":"47","name":"cli helpers reports missing extract script when --all is requested outside the project"}],"source":"import { afterEach, describe, expect, it, vi } from \"vitest\";\nimport { chmodSync, existsSync, mkdtempSync, readFileSync, rmSync, writeFileSync } from \"node:fs\";\nimport { tmpdir } from \"node:os\";\nimport { join } from \"node:path\";\n\nvi.mock(\"./config.js\", () => ({\n  findConfigFile: vi.fn(),\n}));\n\nvi.mock(\"./sandbox/clients.js\", () => ({\n  getServerConfigs: vi.fn(),\n}));\n\nimport * as cli from \"./cli.js\";\nimport * as config from \"./config.js\";\nimport * as clients from \"./sandbox/clients.js\";\n\ndescribe(\"cli helpers\", () => {\n  const originalPath = process.env.PATH;\n\n  afterEach(() => {\n    process.env.PATH = originalPath;\n    vi.restoreAllMocks();\n  });\n\n  it(\"checks command availability via PATH lookup\", () => {\n    expect(cli.isCommandAvailable(\"node\")).toBe(true);\n    expect(cli.isCommandAvailable(\"does-not-exist\")).toBe(false);\n  });\n\n  it(\"checks command availability for explicit paths and quoted PATH entries\", () => {\n    const rootDir = mkdtempSync(join(tmpdir(), \"tool-executor-cli-\"));\n    const commandPath = join(rootDir, \"probe\");\n    writeFileSync(commandPath, \"#!/bin/sh\\n\");\n    chmodSync(commandPath, 0o755);\n\n    process.env.PATH = `\"${rootDir}\"`;\n\n    expect(cli.isCommandAvailable(commandPath)).toBe(true);\n    expect(cli.isCommandAvailable(\"probe\")).toBe(true);\n    expect(cli.isCommandAvailable(join(rootDir, \"missing\"))).toBe(false);\n    expect(cli.isCommandAvailable(\"\")).toBe(false);\n\n    rmSync(rootDir, { recursive: true, force: true });\n  });\n\n  it(\"prints check status with hint text\", () => {\n    const consoleSpy = vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n    vi.spyOn(cli, \"isCommandAvailable\").mockReturnValue(true);\n\n    cli.checkCommand(\"node\", \"Node runtime\");\n\n    expect(consoleSpy).toHaveBeenCalledWith(\"Node runtime: ✅ Found\");\n  });\n\n  it(\"reports missing command with hint\", () => {\n    const consoleSpy = vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n    vi.spyOn(cli, \"isCommandAvailable\").mockReturnValue(false);\n\n    cli.checkCommand(\"missing\", \"Missing binary\", \"Run installer\");\n\n    expect(consoleSpy).toHaveBeenCalledWith(expect.stringContaining(\"Missing binary: ⚠️ Not found (Run installer)\"));\n  });\n\n  it(\"checks config detection result\", () => {\n    const consoleSpy = vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n    vi.spyOn(config, \"findConfigFile\").mockReturnValue(\"/tmp/tool-executor.config.json\");\n\n    cli.checkConfig();\n    expect(consoleSpy).toHaveBeenCalledWith(\"Config file: ✅ Found\");\n    expect(consoleSpy).toHaveBeenCalledWith(\"  - /tmp/tool-executor.config.json\");\n  });\n\n  it(\"checks missing config detection result\", () => {\n    const consoleSpy = vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n    vi.spyOn(config, \"findConfigFile\").mockReturnValue(null);\n\n    cli.checkConfig();\n\n    expect(consoleSpy).toHaveBeenCalledWith(\"Config file: ⚠️ Not found (using defaults)\");\n    expect(consoleSpy).toHaveBeenCalledTimes(1);\n  });\n\n  it(\"checks configured servers using mocked server list\", () => {\n    const consoleSpy = vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n    vi.spyOn(clients, \"getServerConfigs\").mockReturnValue([\n      { name: \"probe\", displayName: \"Probe Server\", command: \"node\", args: [] },\n    ]);\n\n    cli.checkConfiguredServers();\n\n    expect(consoleSpy).toHaveBeenCalledWith(expect.stringContaining(\"Probe Server (probe) command: ✅ Found\"));\n  });\n\n  it(\"checks registry directory presence\", () => {\n    expect(cli.checkRegistry()).toBe(true);\n  });\n\n  it(\"runs the doctor command\", async () => {\n    const consoleSpy = vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n    vi.spyOn(config, \"findConfigFile\").mockReturnValue(null);\n    vi.spyOn(clients, \"getServerConfigs\").mockReturnValue([\n      { name: \"probe\", displayName: \"Probe Server\", command: \"node\", args: [] },\n    ]);\n\n    await cli.program.parseAsync([\"node\", \"claudikins\", \"doctor\"]);\n\n    expect(consoleSpy).toHaveBeenCalledWith(\"🔍 Checking environment...\\n\");\n    expect(consoleSpy).toHaveBeenCalledWith(expect.stringContaining(\"Node.js:\"));\n    expect(consoleSpy).toHaveBeenCalledWith(\"Config file: ⚠️ Not found (using defaults)\");\n    expect(consoleSpy).toHaveBeenCalledWith(\"Registry: ✅ Found\");\n    expect(consoleSpy).toHaveBeenCalledWith(expect.stringContaining(\"Probe Server (probe) command: ✅ Found\"));\n    expect(consoleSpy).toHaveBeenCalledWith(\"\\n✨ Doctor complete\");\n  });\n\n  it(\"runs init command without overwriting an existing config\", async () => {\n    const rootDir = mkdtempSync(join(tmpdir(), \"tool-executor-init-\"));\n    const consoleSpy = vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n    vi.spyOn(process, \"cwd\").mockReturnValue(rootDir);\n\n    await cli.program.parseAsync([\"node\", \"claudikins\", \"init\"]);\n\n    const configPath = join(rootDir, \"tool-executor.config.json\");\n    expect(existsSync(configPath)).toBe(true);\n    expect(JSON.parse(readFileSync(configPath, \"utf-8\"))).toMatchObject({\n      servers: [\n        {\n          name: \"example\",\n          displayName: \"Example Server\",\n          command: \"npx\",\n          args: [\"-y\", \"example-mcp-server\"],\n        },\n      ],\n    });\n    expect(consoleSpy).toHaveBeenCalledWith(\"✅ Created tool-executor.config.json\");\n\n    await cli.program.parseAsync([\"node\", \"claudikins\", \"init\"]);\n    expect(consoleSpy).toHaveBeenCalledWith(\"⚠️ Config file already exists\");\n\n    rmSync(rootDir, { recursive: true, force: true });\n  });\n\n  it(\"prints extract usage when --all is omitted\", async () => {\n    const consoleSpy = vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n\n    await cli.program.parseAsync([\"node\", \"claudikins\", \"extract\"]);\n\n    expect(consoleSpy).toHaveBeenCalledWith(\"Usage: claudikins extract --all\");\n    expect(consoleSpy).toHaveBeenCalledWith(\"\\nExtracts tool schemas from all configured MCP servers\");\n    expect(consoleSpy).toHaveBeenCalledWith(\"and generates YAML files in the registry/ directory.\");\n  });\n\n  it(\"reports missing extract script when --all is requested outside the project\", async () => {\n    const rootDir = mkdtempSync(join(tmpdir(), \"tool-executor-extract-\"));\n    vi.spyOn(process, \"cwd\").mockReturnValue(rootDir);\n    vi.spyOn(console, \"log\").mockImplementation(() => undefined);\n    const consoleErrorSpy = vi.spyOn(console, \"error\").mockImplementation(() => undefined);\n    vi.spyOn(process, \"exit\").mockImplementation((code?: string | number | null) => {\n      throw new Error(`exit ${code}`);\n    });\n\n    await expect(cli.program.parseAsync([\"node\", \"claudikins\", \"extract\", \"--all\"])).rejects.toThrow(\"exit 1\");\n\n    expect(consoleErrorSpy).toHaveBeenCalledWith(\"❌ Extract script not found at scripts/extract-schemas.ts\");\n    expect(consoleErrorSpy).toHaveBeenCalledWith(\"   Make sure you're in the claudikins-tool-executor directory\");\n    rmSync(rootDir, { recursive: true, force: true });\n  });\n});\n"},"src/search.test.ts":{"tests":[{"id":"48","name":"loadToolDefinition loads valid YAML tool definitions"},{"id":"49","name":"loadToolDefinition returns null for invalid definitions"},{"id":"50","name":"loadToolDefinition returns null when file read fails"},{"id":"51","name":"searchTools uses local search when Serena is unavailable"},{"id":"52","name":"searchTools returns Serena results when registry search succeeds"},{"id":"53","name":"searchTools paginates Serena results and stops loading at requested limit"},{"id":"54","name":"searchTools uses local search when Serena returns no content"},{"id":"55","name":"searchTools escapes single-term Serena search patterns"},{"id":"56","name":"searchTools uses BM25 local results before text scoring"},{"id":"57","name":"searchTools sorts local text results and applies pagination"},{"id":"58","name":"searchTools paginates local text results after scoring"},{"id":"59","name":"searchTools returns suggestions when nothing local matches"},{"id":"60","name":"search module helpers returns categories from registry root"},{"id":"61","name":"search module helpers lists tools in a category"},{"id":"62","name":"search module helpers gets a tool by name"},{"id":"63","name":"search module helpers returns null for missing tool names"},{"id":"64","name":"search module helpers disconnects the registry Serena client without error"}],"source":"import { afterEach, describe, expect, it, vi } from \"vitest\";\n\nvi.mock(\"node:fs/promises\", () => ({\n  readFile: vi.fn(),\n}));\n\nvi.mock(\"glob\", () => ({\n  glob: vi.fn(),\n}));\n\nvi.mock(\"js-yaml\", () => ({\n  default: {\n    load: vi.fn(),\n  },\n}));\n\nvi.mock(\"./bm25.js\", () => ({\n  initBM25: vi.fn(),\n  searchBM25: vi.fn(),\n  isBM25Ready: vi.fn(),\n}));\n\nvi.mock(\"@modelcontextprotocol/sdk/client/index.js\", () => ({\n  Client: vi.fn().mockImplementation(() => ({\n    connect: vi.fn().mockRejectedValue(new Error(\"serena unavailable\")),\n    callTool: vi.fn(),\n    close: vi.fn(),\n  })),\n}));\n\nvi.mock(\"@modelcontextprotocol/sdk/client/stdio.js\", () => ({\n  StdioClientTransport: vi.fn(),\n}));\n\nimport { readFile } from \"node:fs/promises\";\nimport { glob } from \"glob\";\nimport yaml from \"js-yaml\";\nimport { Client } from \"@modelcontextprotocol/sdk/client/index.js\";\n\nimport {\n  disconnectRegistrySerena,\n  getCategories,\n  getToolByName,\n  listToolsInCategory,\n  loadToolDefinition,\n  searchTools,\n} from \"./search.js\";\n\nimport { initBM25, isBM25Ready, searchBM25 } from \"./bm25.js\";\n\ntype ToolFixture = {\n  name: string;\n  server: string;\n  category: string;\n  description: string;\n  inputSchema: Record<"+"string, unknown>;\n  example: string;\n  notes?: string;\n};\n\nconst mockReadFile = vi.mocked(readFile);\nconst mockGlob = vi.mocked(glob);\nconst mockYamlLoad = vi.mocked(yaml.load);\nconst mockInitBM25 = vi.mocked(initBM25);\nconst mockIsBM25Ready = vi.mocked(isBM25Ready);\nconst mockSearchBM25 = vi.mocked(searchBM25);\nconst mockClient = vi.mocked(Client);\n\nconst toolFixtures: Record<"+"string, ToolFixture> = {\n  \"/registry/ui/diagram.yaml\": {\n    name: \"diagram-generator\",\n    server: \"gemini\",\n    category: \"ui\",\n    description: \"Generate diagrams from prompts\",\n    inputSchema: {},\n    example: \"gemini.generate\",\n  },\n  \"/registry/code-nav/search.yaml\": {\n    name: \"code-search\",\n    server: \"serena\",\n    category: \"code-nav\",\n    description: \"Search code quickly\",\n    inputSchema: {},\n    example: \"serena.search\",\n  },\n};\n\nafterEach(async () => {\n  await disconnectRegistrySerena();\n  vi.restoreAllMocks();\n});\n\ndescribe(\"loadToolDefinition\", () => {\n  it(\"loads valid YAML tool definitions\", async () => {\n    mockReadFile.mockResolvedValue(\"ok\");\n    mockYamlLoad.mockReturnValue(toolFixtures[\"/registry/ui/diagram.yaml\"]);\n\n    const tool = await loadToolDefinition(\"/registry/ui/diagram.yaml\");\n\n    expect(tool).toEqual(toolFixtures[\"/registry/ui/diagram.yaml\"]);\n    expect(mockReadFile).toHaveBeenCalledWith(\"/registry/ui/diagram.yaml\", \"utf-8\");\n  });\n\n  it(\"returns null for invalid definitions\", async () => {\n    mockReadFile.mockResolvedValue(\"ok\");\n    mockYamlLoad.mockReturnValue({ name: \"diagram-generator\", server: \"gemini\" });\n\n    await expect(loadToolDefinition(\"/registry/ui/invalid.yaml\")).resolves.toBeNull();\n  });\n\n  it(\"returns null when file read fails\", async () => {\n    mockReadFile.mockRejectedValue(new Error(\"missing\"));\n\n    await expect(loadToolDefinition(\"/registry/ui/missing.yaml\")).resolves.toBeNull();\n  });\n});\n\ndescribe(\"searchTools\", () => {\n  afterEach(() => {\n    mockInitBM25.mockReset();\n    mockIsBM25Ready.mockReset();\n    mockSearchBM25.mockReset();\n    mockReadFile.mockReset();\n    mockGlob.mockReset();\n    mockYamlLoad.mockReset();\n  });\n\n  it(\"uses local search when Serena is unavailable\", async () => {\n    mockInitBM25.mockReturnValue(undefined);\n    mockIsBM25Ready.mockReturnValue(false);\n    mockSearchBM25.mockReturnValue([]);\n\n    mockGlob.mockImplementation(async (pattern: string) => {\n      if (pattern === \"*/\") {\n        return [];\n      }\n      return [\"/registry/ui/diagram.yaml\", \"/registry/code-nav/search.yaml\"];\n    });\n\n    mockReadFile.mockImplementation(async (path: string) => {\n      return JSON.stringify(toolFixtures[path as keyof typeof toolFixtures] || {});\n    });\n\n    mockYamlLoad.mockImplementation((content: string) => {\n      if (!content || content === \"{}\") {\n        return {} as ToolFixture;\n      }\n      return JSON.parse(content) as ToolFixture;\n    });\n\n    const response = await searchTools(\"diagram\");\n\n    expect(response.source).toBe(\"local\");\n    expect(response.fallbackReason).toBe(\"Serena unavailable - using text search\");\n    expect(response.results).toHaveLength(1);\n    expect(response.results[0].tool.name).toBe(\"diagram-generator\");\n    expect(response.totalCount).toBe(1);\n  });\n\n  it(\"returns Serena results when registry search succeeds\", async () => {\n    const callTool = vi.fn()\n      .mockResolvedValueOnce({ content: [] })\n      .mockResolvedValueOnce({\n        content: [\n          {\n            type: \"text\",\n            text: \"ui/gemini/generate-diagram.yaml: description: Generate diagrams\",\n          },\n          {\n            type: \"text\",\n            text: \"ui/gemini/generate-diagram.yaml: duplicate match\",\n          },\n          {\n            type: \"text\",\n            text: \"not a registry path\",\n          },\n        ],\n      });\n    const close = vi.fn().mockResolvedValue(undefined);\n    mockClient.mockImplementationOnce(function () {\n      return {\n      connect: vi.fn().mockResolvedValue(undefined),\n      callTool,\n      close,\n      } as unknown as Client;\n    });\n    mockReadFile.mockResolvedValue(JSON.stringify(toolFixtures[\"/registry/ui/diagram.yaml\"]));\n    mockYamlLoad.mockReturnValue(toolFixtures[\"/registry/ui/diagram.yaml\"]);\n\n    const response = await searchTools(\"generate diagram\", 1, 0);\n\n    expect(response).toMatchObject({\n      source: \"serena\",\n      totalCount: 1,\n      results: [\n        {\n          score: 1,\n          tool: { name: \"diagram-generator\" },\n          matchContext: expect.stringContaining(\"generate-diagram.yaml\"),\n        },\n      ],\n    });\n    expect(callTool).toHaveBeenNthCalledWith(1, {\n      name: \"activate_project\",\n      arguments: { project: expect.stringContaining(\"registry\") },\n    });\n    expect(callTool).toHaveBeenNthCalledWith(2, {\n      name: \"search_for_pattern\",\n      arguments: expect.objectContaining({\n        substring_pattern: \"(?=.*generate)(?=.*diagram).*\",\n        relative_path: \".\",\n      }),\n    });\n  });\n\n  it(\"paginates Serena results and stops loading at requested limit\", async () => {\n    const callTool = vi.fn()\n      .mockResolvedValueOnce({ content: [] })\n      .mockResolvedValueOnce({\n        content: [\n          {\n            type: \"text\",\n            text: [\n              \"ui/gemini/generate-diagram.yaml: description: Generate diagrams\",\n              \"code-nav/serena/search-code.yaml: description: Search code\",\n            ].join(\"\\n\"),\n          },\n        ],\n      });\n    mockClient.mockImplementationOnce(function () {\n      return {\n        connect: vi.fn().mockResolvedValue(undefined),\n        callTool,\n        close: vi.fn().mockResolvedValue(undefined),\n      } as unknown as Client;\n    });\n    mockReadFile.mockImplementation(async (path: string) => {\n      if (path.includes(\"generate-diagram\")) {\n        return JSON.stringify(toolFixtures[\"/registry/ui/diagram.yaml\"]);\n      }\n      return JSON.stringify(toolFixtures[\"/registry/code-nav/search.yaml\"]);\n    });\n    mockYamlLoad.mockImplementation((content: string) => JSON.parse(content) as ToolFixture);\n\n    const response = await searchTools(\"tool\", 1, 0);\n\n    expect(response.source).toBe(\"serena\");\n    expect(response.results).toHaveLength(1);\n    expect(response.results[0].tool.name).toBe(\"diagram-generator\");\n    expect(mockReadFile).toHaveBeenCalledTimes(1);\n  });\n\n  it(\"uses local search when Serena returns no content\", async () => {\n    const callTool = vi.fn()\n      .mockResolvedValueOnce({ content: [] })\n      .mockResolvedValueOnce({ content: [] });\n    mockClient.mockImplementationOnce(function () {\n      return {\n        connect: vi.fn().mockResolvedValue(undefined),\n        callTool,\n        close: vi.fn().mockResolvedValue(undefined),\n      } as unknown as Client;\n    });\n    mockInitBM25.mockReturnValue(undefined);\n    mockIsBM25Ready.mockReturnValue(false);\n    mockSearchBM25.mockReturnValue([]);\n    mockGlob.mockResolvedValue([\"/registry/ui/diagram.yaml\"] as string[]);\n    mockReadFile.mockResolvedValue(JSON.stringify(toolFixtures[\"/registry/ui/diagram.yaml\"]));\n    mockYamlLoad.mockReturnValue(toolFixtures[\"/registry/ui/diagram.yaml\"]);\n\n    const response = await searchTools(\"diagram\", 5, 0);\n\n    expect(response.source).toBe(\"local\");\n    expect(response.fallbackReason).toBe(\"No semantic matches - using text search\");\n    expect(response.results[0].tool.name).toBe(\"diagram-generator\");\n  });\n\n  it(\"escapes single-term Serena search patterns\", async () => {\n    const callTool = vi.fn()\n      .mockResolvedValueOnce({ content: [] })\n      .mockResolvedValueOnce({\n        content: [\n          {\n            type: \"text\",\n            text: \"ui/gemini/generate-diagram.yml: description: Generate diagrams\",\n          },\n        ],\n      });\n    mockClient.mockImplementationOnce(function () {\n      return {\n        connect: vi.fn().mockResolvedValue(undefined),\n        callTool,\n        close: vi.fn().mockResolvedValue(undefined),\n      } as unknown as Client;\n    });\n    mockReadFile.mockResolvedValue(JSON.stringify(toolFixtures[\"/registry/ui/diagram.yaml\"]));\n    mockYamlLoad.mockReturnValue(toolFixtures[\"/registry/ui/diagram.yaml\"]);\n\n    const response = await searchTools(\"a+b\", 1, 0);\n\n    expect(response.source).toBe(\"serena\");\n    expect(callTool).toHaveBeenNthCalledWith(2, {\n      name: \"search_for_pattern\",\n      arguments: expect.objectContaining({\n        substring_pattern: \"a\\\\+b\",\n      }),\n    });\n  });\n\n  it(\"uses BM25 local results before text scoring\", async () => {\n    mockIsBM25Ready.mockReturnValue(true);\n    mockSearchBM25.mockReturnValue([\n      toolFixtures[\"/registry/code-nav/search.yaml\"],\n      toolFixtures[\"/registry/ui/diagram.yaml\"],\n    ]);\n\n    const response = await searchTools(\"code search\", 5, 0);\n\n    expect(response.source).toBe(\"local\");\n    expect(response.results).toEqual([\n      {\n        tool: toolFixtures[\"/registry/code-nav/search.yaml\"],\n        score: 1,\n      },\n      {\n        tool: toolFixtures[\"/registry/ui/diagram.yaml\"],\n        score: 0.99,\n      },\n    ]);\n    expect(response.totalCount).toBe(2);\n    expect(mockGlob).not.toHaveBeenCalled();\n  });\n\n  it(\"sorts local text results and applies pagination\", async () => {\n    mockInitBM25.mockReturnValue(undefined);\n    mockIsBM25Ready.mockReturnValue(false);\n    mockSearchBM25.mockReturnValue([]);\n    mockGlob.mockResolvedValue([\"/registry/ui/diagram.yaml\", \"/registry/code-nav/search.yaml\"] as string[]);\n    mockReadFile.mockImplementation(async (path: string) => {\n      return JSON.stringify(toolFixtures[path as keyof typeof toolFixtures]);\n    });\n    mockYamlLoad.mockImplementation((content: string) => JSON.parse(content) as ToolFixture);\n\n    const response = await searchTools(\"diagram code\", 2, 0);\n\n    expect(response.source).toBe(\"local\");\n    expect(response.totalCount).toBe(2);\n    expect(response.results).toHaveLength(2);\n    expect(response.results[0]).toMatchObject({\n      tool: { name: \"code-search\" },\n      score: 2,\n    });\n    expect(response.results[1]).toMatchObject({\n      tool: { name: \"diagram-generator\" },\n      score: 1.5,\n    });\n  });\n\n  it(\"paginates local text results after scoring\", async () => {\n    mockInitBM25.mockReturnValue(undefined);\n    mockIsBM25Ready.mockReturnValue(false);\n    mockSearchBM25.mockReturnValue([]);\n    mockGlob.mockResolvedValue([\"/registry/ui/diagram.yaml\", \"/registry/code-nav/search.yaml\"] as string[]);\n    mockReadFile.mockImplementation(async (path: string) => {\n      return JSON.stringify(toolFixtures[path as keyof typeof toolFixtures]);\n    });\n    mockYamlLoad.mockImplementation((content: string) => JSON.parse(content) as ToolFixture);\n\n    const response = await searchTools(\"diagram code\", 1, 1);\n\n    expect(response.source).toBe(\"local\");\n    expect(response.totalCount).toBe(2);\n    expect(response.results).toHaveLength(1);\n    expect(response.results[0].tool.name).toBe(\"diagram-generator\");\n  });\n\n  it(\"returns suggestions when nothing local matches\", async () => {\n    mockInitBM25.mockReturnValue(undefined);\n    mockIsBM25Ready.mockReturnValue(false);\n    mockSearchBM25.mockReturnValue([]);\n\n    mockGlob.mockImplementation(async () => [\"/registry/ui/diagram.yaml\"]);\n    mockReadFile.mockImplementation(async () => JSON.stringify(toolFixtures[\"/registry/ui/diagram.yaml\"]));\n    mockYamlLoad.mockImplementation(() => ({\n      ...toolFixtures[\"/registry/ui/diagram.yaml\"],\n      description: \"Generate diagrams from prompts\",\n    }));\n\n    const response = await searchTools(\"non-matching query\");\n\n    expect(response.source).toBe(\"local\");\n    expect(response.results).toEqual([]);\n    expect(response.fallbackReason).toBe(\"Serena unavailable - using text search\");\n    expect(response.suggestion).toContain(\"Try broader terms\");\n    expect(response.totalCount).toBe(0);\n  });\n});\n\ndescribe(\"search module helpers\", () => {\n  it(\"returns categories from registry root\", async () => {\n    mockGlob.mockResolvedValue([\"ui/\", \"code-nav/\"] as string[]);\n\n    const categories = await getCategories();\n\n    expect(categories).toEqual([\"ui\", \"code-nav\"]);\n    expect(mockGlob).toHaveBeenCalledWith(\"*/\", {\n      cwd: expect.stringContaining(\"registry\"),\n    });\n  });\n\n  it(\"lists tools in a category\", async () => {\n    mockGlob.mockResolvedValue([\"/registry/ui/diagram.yaml\"] as string[]);\n    mockReadFile.mockResolvedValue(JSON.stringify(toolFixtures[\"/registry/ui/diagram.yaml\"]));\n    mockYamlLoad.mockReturnValue(toolFixtures[\"/registry/ui/diagram.yaml\"]);\n\n    const tools = await listToolsInCategory(\"ui\");\n\n    expect(tools).toHaveLength(1);\n    expect(tools[0].name).toBe(\"diagram-generator\");\n    expect(mockGlob).toHaveBeenCalledWith(\"**/*.{yaml,yml}\", {\n      cwd: expect.stringContaining(\"registry/ui\"),\n      absolute: true,\n    });\n  });\n\n  it(\"gets a tool by name\", async () => {\n    mockGlob.mockResolvedValue([\"/registry/ui/diagram.yaml\", \"/registry/code-nav/search.yaml\"] as string[]);\n    mockReadFile.mockImplementation(async (path: string) => {\n      return JSON.stringify(toolFixtures[path as keyof typeof toolFixtures]);\n    });\n    mockYamlLoad.mockImplementation((content: string) => JSON.parse(content) as ToolFixture);\n\n    const tool = await getToolByName(\"code-search\");\n\n    expect(tool).toMatchObject({\n      name: \"code-search\",\n      server: \"serena\",\n    });\n    expect(mockGlob).toHaveBeenCalledWith(\"**/*.{yaml,yml}\", {\n      cwd: expect.stringContaining(\"registry\"),\n      absolute: true,\n    });\n  });\n\n  it(\"returns null for missing tool names\", async () => {\n    mockGlob.mockResolvedValue([\"/registry/ui/diagram.yaml\"] as string[]);\n    mockReadFile.mockResolvedValue(\"{}\");\n    mockYamlLoad.mockReturnValue({} as ToolFixture);\n\n    const tool = await getToolByName(\"missing\");\n\n    expect(tool).toBeNull();\n  });\n\n  it(\"disconnects the registry Serena client without error\", async () => {\n    await expect(disconnectRegistrySerena()).resolves.toBeUndefined();\n  });\n});\n"},"src/schemas.test.ts":{"tests":[{"id":"65","name":"schemas applies defaults for search tools input"},{"id":"66","name":"schemas validates search tools input"},{"id":"67","name":"schemas validates get tool schema input"},{"id":"68","name":"schemas applies defaults and validates execute input"}],"source":"import { describe, expect, it } from \"vitest\";\n\nimport {\n  SearchToolsInputSchema,\n  GetToolSchemaInputSchema,\n  ExecuteCodeInputSchema,\n} from \"./schemas.js\";\n\ndescribe(\"schemas\", () => {\n  it(\"applies defaults for search tools input\", () => {\n    const parsed = SearchToolsInputSchema.parse({ query: \"diagram\" });\n    expect(parsed).toMatchObject({\n      query: \"diagram\",\n      limit: 5,\n      offset: 0,\n    });\n  });\n\n  it(\"validates search tools input\", () => {\n    expect(() => SearchToolsInputSchema.parse({ query: \"\" })).toThrow();\n    expect(() => SearchToolsInputSchema.parse({ query: \"ok\", limit: 0 })).toThrow();\n    expect(() => SearchToolsInputSchema.parse({ query: \"ok\", limit: 51 })).toThrow();\n    expect(() => SearchToolsInputSchema.parse({ query: \"ok\", limit: 1.5 })).toThrow();\n    expect(() => SearchToolsInputSchema.parse({ query: \"ok\", offset: -1 })).toThrow();\n    expect(() => SearchToolsInputSchema.parse({ query: \"ok\", extra: true })).toThrow();\n    expect(SearchToolsInputSchema.parse({ query: \"ok\", limit: 50, offset: 2 })).toEqual({\n      query: \"ok\",\n      limit: 50,\n      offset: 2,\n    });\n    expect(SearchToolsInputSchema.shape.query.description).toBe(\"Search query for finding relevant tools\");\n    expect(SearchToolsInputSchema.shape.limit.description).toBe(\"Maximum results to return (default: 5)\");\n    expect(SearchToolsInputSchema.shape.offset.description).toBe(\"Number of results to skip for pagination (default: 0)\");\n  });\n\n  it(\"validates get tool schema input\", () => {\n    expect(() => GetToolSchemaInputSchema.parse({ name: \"\" })).toThrow();\n    expect(() => GetToolSchemaInputSchema.parse({ name: \"ok\" })).not.toThrow();\n    expect(() => GetToolSchemaInputSchema.parse({ name: \"ok\", extra: true })).toThrow();\n    expect(GetToolSchemaInputSchema.shape.name.description).toBe(\"Tool name (from search_tools results)\");\n  });\n\n  it(\"applies defaults and validates execute input\", () => {\n    const parsed = ExecuteCodeInputSchema.parse({ code: \"1 + 1\" });\n    expect(parsed.timeout).toBe(30000);\n    expect(() => ExecuteCodeInputSchema.parse({ code: \"\" })).toThrow();\n    expect(() => ExecuteCodeInputSchema.parse({ code: \"1+1\", timeout: 10 })).toThrow();\n    expect(() => ExecuteCodeInputSchema.parse({ code: \"1+1\", timeout: 600001 })).toThrow();\n    expect(() => ExecuteCodeInputSchema.parse({ code: \"1+1\", timeout: 1000.5 })).toThrow();\n    expect(() => ExecuteCodeInputSchema.parse({ code: \"1+1\", timeout: 1000, extra: true })).toThrow();\n    expect(ExecuteCodeInputSchema.parse({ code: \"1+1\", timeout: 1000 })).toEqual({\n      code: \"1+1\",\n      timeout: 1000,\n    });\n    expect(ExecuteCodeInputSchema.shape.code.description).toBe(\"TypeScript/JavaScript code to execute\");\n    expect(ExecuteCodeInputSchema.shape.timeout.description).toBe(\"Execution timeout in ms (default: 30000)\");\n  });\n});\n"},"src/tools/search.test.ts":{"tests":[{"id":"69","name":"tools/search handler maps search results to compact MCP output"},{"id":"70","name":"tools/search handler truncates long descriptions and computes pagination metadata"},{"id":"71","name":"tools/search handler handles empty descriptions without pagination overflow"},{"id":"72","name":"tools/search handler exposes fallback fields from local search"}],"source":"import { afterEach, describe, expect, it, vi } from \"vitest\";\n\nimport * as searchModule from \"../search.js\";\nimport { handleSearchTools } from \"./search.js\";\nimport type { SearchResult } from \"../search.js\";\n\ndescribe(\"tools/search handler\", () => {\n  afterEach(() => {\n    vi.restoreAllMocks();\n  });\n\n  it(\"maps search results to compact MCP output\", async () => {\n    const sampleResults: SearchResult[] = [\n      {\n        tool: {\n          name: \"diagram-generator\",\n          server: \"gemini\",\n          category: \"ui\",\n          description: \"Generate diagrams from prompts.\\nSupports mermaid and charts.\",\n          inputSchema: {},\n          example: \"gemini.generate\",\n        },\n        score: 1,\n      },\n    ];\n\n    vi.spyOn(searchModule, \"searchTools\").mockResolvedValue({\n      source: \"serena\",\n      results: sampleResults,\n      totalCount: 2,\n    });\n\n    const response = await handleSearchTools({ query: \"diagram\", limit: 1, offset: 0 });\n    expect(response.structuredContent).toMatchObject({\n      source: \"serena\",\n      count: 1,\n      limit: 1,\n      offset: 0,\n      totalCount: 2,\n      has_more: true,\n      results: [\n        {\n          name: \"diagram-generator\",\n          server: \"gemini\",\n          description: \"Generate diagrams from prompts.\",\n        },\n      ],\n    });\n    expect(response.content).toHaveLength(1);\n    expect(response.content[0].text).toContain(\"diagram-generator\");\n  });\n\n  it(\"truncates long descriptions and computes pagination metadata\", async () => {\n    const longDescription = `${\"x\".repeat(90)}\\nsecond line`;\n    vi.spyOn(searchModule, \"searchTools\").mockResolvedValue({\n      source: \"local\",\n      results: [\n        {\n          tool: {\n            name: \"long-tool\",\n            server: \"gemini\",\n            category: \"ui\",\n            description: longDescription,\n            inputSchema: {},\n            example: \"gemini.long\",\n          },\n          score: 1,\n        },\n      ],\n      totalCount: 3,\n    });\n\n    const response = await handleSearchTools({ query: \"long\", limit: 1, offset: 1 });\n\n    expect(response.structuredContent.results[0].description).toBe(`${\"x\".repeat(77)}...`);\n    expect(response.structuredContent.has_more).toBe(true);\n    expect(JSON.parse(response.content[0].text).results[0].description).toBe(`${\"x\".repeat(77)}...`);\n  });\n\n  it(\"handles empty descriptions without pagination overflow\", async () => {\n    vi.spyOn(searchModule, \"searchTools\").mockResolvedValue({\n      source: \"local\",\n      results: [\n        {\n          tool: {\n            name: \"empty-description\",\n            server: \"gemini\",\n            category: \"ui\",\n            description: \"\",\n            inputSchema: {},\n            example: \"gemini.empty\",\n          },\n          score: 1,\n        },\n      ],\n      totalCount: 1,\n    });\n\n    const response = await handleSearchTools({ query: \"empty\", limit: 5, offset: 0 });\n\n    expect(response.structuredContent.results[0].description).toBe(\"\");\n    expect(response.structuredContent.has_more).toBe(false);\n  });\n\n  it(\"exposes fallback fields from local search\", async () => {\n    vi.spyOn(searchModule, \"searchTools\").mockResolvedValue({\n      source: \"local\",\n      results: [],\n      totalCount: 0,\n      fallbackReason: \"No semantic matches - using text search\",\n      suggestion: \"Try a broader term\",\n    });\n\n    const response = await handleSearchTools({ query: \"none\", limit: 3, offset: 0 });\n\n    expect(response.structuredContent).toMatchObject({\n      count: 0,\n      has_more: false,\n      source: \"local\",\n      fallbackReason: \"No semantic matches - using text search\",\n      suggestion: \"Try a broader term\",\n    });\n    expect(response.structuredContent.results).toEqual([]);\n  });\n});\n"},"src/tools/execute.test.ts":{"tests":[{"id":"73","name":"tools/execute handler returns execution result"},{"id":"74","name":"tools/execute handler reflects execution errors"}],"source":"import { afterEach, describe, expect, it, vi } from \"vitest\";\n\nimport * as runtime from \"../sandbox/runtime.js\";\nimport { handleExecuteCode } from \"./execute.js\";\n\ndescribe(\"tools/execute handler\", () => {\n  afterEach(() => {\n    vi.restoreAllMocks();\n  });\n\n  it(\"returns execution result\", async () => {\n    vi.spyOn(runtime, \"executeCode\").mockResolvedValue({\n      logs: [\"ok\", { returned: 1 }],\n    });\n\n    const response = await handleExecuteCode({ code: \"1 + 1\", timeout: 1234 });\n\n    expect(response.isError).toBe(false);\n    expect(response.content[0].type).toBe(\"text\");\n    expect(response.structuredContent).toEqual({ logs: [\"ok\", { returned: 1 }] });\n    expect(response.content[0].text).toContain(\"returned\");\n  });\n\n  it(\"reflects execution errors\", async () => {\n    vi.spyOn(runtime, \"executeCode\").mockResolvedValue({\n      logs: [],\n      error: \"boom\",\n      stack: \"stacktrace\",\n    });\n\n    const response = await handleExecuteCode({ code: \"boom\", timeout: 1234 });\n\n    expect(response.isError).toBe(true);\n    expect(response.content[0].type).toBe(\"text\");\n    expect(response.structuredContent).toMatchObject({\n      error: \"boom\",\n      stack: \"stacktrace\",\n      logs: [],\n    });\n  });\n});\n"},"src/tools/schema.test.ts":{"tests":[{"id":"75","name":"tools/schema handler returns tool schema when tool exists"},{"id":"76","name":"tools/schema handler returns an error for missing tools"}],"source":"import { afterEach, describe, expect, it, vi } from \"vitest\";\n\nimport * as searchModule from \"../search.js\";\nimport { handleGetToolSchema } from \"./schema.js\";\n\ndescribe(\"tools/schema handler\", () => {\n  afterEach(() => {\n    vi.restoreAllMocks();\n  });\n\n  it(\"returns tool schema when tool exists\", async () => {\n    vi.spyOn(searchModule, \"getToolByName\").mockResolvedValue({\n      name: \"diagram-generator\",\n      server: \"gemini\",\n      category: \"ui\",\n      description: \"Generate diagrams from code\",\n      inputSchema: { type: \"object\", properties: {} },\n      example: \"gemini.generate-diagram\",\n      notes: \"Supports mermaid\",\n    });\n\n    const response = await handleGetToolSchema({ name: \"diagram-generator\" });\n    const parsed = JSON.parse(response.content[0].text);\n\n    expect(response.isError).toBeUndefined();\n    expect(response.structuredContent).toMatchObject({\n      name: \"diagram-generator\",\n      server: \"gemini\",\n      description: \"Generate diagrams from code\",\n      example: \"gemini.generate-diagram\",\n      inputSchema: { type: \"object\", properties: {} },\n      notes: \"Supports mermaid\",\n    });\n    expect(response.content[0].type).toBe(\"text\");\n    expect(response.content).toHaveLength(1);\n    expect(parsed.notes).toBe(\"Supports mermaid\");\n  });\n\n  it(\"returns an error for missing tools\", async () => {\n    vi.spyOn(searchModule, \"getToolByName\").mockResolvedValue(null);\n\n    const response = await handleGetToolSchema({ name: \"missing-tool\" });\n\n    expect(response.isError).toBe(true);\n    expect(response.content).toHaveLength(1);\n    expect(re
