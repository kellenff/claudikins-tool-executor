,"coveredBy":[],"location":{"end":{"column":21,"line":140},"start":{"column":12,"line":140}}},{"id":"183","mutatorName":"ConditionalExpression","replacement":"true","status":"Survived","static":true,"testsCompleted":12,"coveredBy":[],"location":{"end":{"column":55,"line":170},"start":{"column":5,"line":170}}},{"id":"185","mutatorName":"EqualityOperator","replacement":"process.argv[1] !== fileURLToPath(import.meta.url)","status":"Survived","static":true,"testsCompleted":12,"coveredBy":[],"location":{"end":{"column":55,"line":170},"start":{"column":5,"line":170}}},{"id":"159","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":12,"coveredBy":[],"location":{"end":{"column":61,"line":142},"start":{"column":24,"line":142}}},{"id":"184","mutatorName":"ConditionalExpression","replacement":"false","status":"Survived","static":true,"testsCompleted":12,"coveredBy":[],"location":{"end":{"column":55,"line":170},"start":{"column":5,"line":170}}}],"source":"#!/usr/bin/env node\n\nimport { Command } from \"commander\";\nimport { existsSync, readFileSync, statSync } from \"fs\";\nimport { resolve, dirname, isAbsolute, delimiter, join, extname } from \"path\";\nimport { fileURLToPath } from \"url\";\nimport { execSync } from \"child_process\";\nimport { getServerConfigs } from \"./sandbox/clients.js\";\nimport { findConfigFile } from \"./config.js\";\n\nconst CLI_ROOT = resolve(dirname(fileURLToPath(import.meta.url)), \"..\");\nconst packageJson = JSON.parse(readFileSync(resolve(CLI_ROOT, \"package.json\"), \"utf-8\")) as { version: string };\n\nfunction hasExecutable(pathToCheck: string): boolean {\n  try {\n    return statSync(pathToCheck).isFile();\n  } catch (_a) {\n    return false;\n  }\n}\n\nfunction isCommandAvailable(command: string): boolean {\n  const commandHasExtension = process.platform === \"win32\" && Boolean(extname(command));\n  const pathExtensions = process.platform === \"win32\" && !commandHasExtension\n    ? (process.env.PATHEXT || \".COM;.EXE;.BAT;.CMD\").split(\";\")\n    : [\"\"];\n  const pathDirs = (process.env.PATH || \"\").split(delimiter);\n\n  if (isAbsolute(command) || command.includes(\"/\") || command.includes(\"\\\\\")) {\n    return hasExecutable(command);\n  }\n\n  for (const pathDir of pathDirs) {\n    const cleanDir = pathDir.replace(/^[\"']|[\"']$/g, \"\");\n    for (const ext of pathExtensions) {\n      if (!cleanDir) {\n        continue;\n      }\n\n      if (hasExecutable(join(cleanDir, `${command}${ext}`))) {\n        return true;\n      }\n    }\n  }\n\n  return false;\n}\n\nfunction checkCommand(command: string, label: string, hint?: string): void {\n  const found = isCommandAvailable(command);\n  console.log(`${label}: ${found ? \"✅ Found\" : \"⚠️ Not found\"}${!found && hint ? ` (${hint})` : \"\"}`);\n}\n\nfunction checkConfiguredServers(): void {\n  for (const config of getServerConfigs()) {\n    checkCommand(config.command, `${config.displayName} (${config.name}) command`, \"Ensure executable is available in PATH or set an explicit absolute command in config\");\n  }\n}\n\nfunction checkUvx(): void {\n  checkCommand(\"uvx\", \"uvx\", \"optional, needed for Python MCP servers\");\n}\n\nfunction checkConfig(): void {\n  const configPath = findConfigFile(CLI_ROOT);\n  const found = configPath !== null;\n\n  console.log(`Config file: ${found ? \"✅ Found\" : \"⚠️ Not found (using defaults)\"}`);\n  if (found) {\n    console.log(`  - ${configPath}`);\n  }\n}\n\nfunction checkRegistry(): boolean {\n  return existsSync(resolve(CLI_ROOT, \"registry\"));\n}\n\nconst program = new Command();\n\nprogram\n  .name(\"claudikins\")\n  .description(\"CLI for @claudikins/tool-executor\")\n  .version(packageJson.version);\n\nprogram\n  .command(\"doctor\")\n  .description(\"Check environment and dependencies\")\n  .action(async () => {\n    console.log(\"🔍 Checking environment...\\n\");\n\n    // Check Node version\n    const nodeVersion = process.version;\n    const nodeMajor = parseInt(nodeVersion.slice(1).split(\".\")[0]);\n    console.log(`Node.js: ${nodeVersion} ${nodeMajor >= 18 ? \"✅\" : \"❌ (need 18+)\"}`);\n\n    // Check for Python/uv (for uvx servers)\n    checkUvx();\n\n    // Check for config file\n    checkConfig();\n\n    // Check for registry\n    const registryExists = checkRegistry();\n    console.log(`Registry: ${registryExists ? \"✅ Found\" : \"❌ Not found\"}`);\n\n    checkConfiguredServers();\n\n    console.log(\"\\n✨ Doctor complete\");\n  });\n\nprogram\n  .command(\"init\")\n  .description(\"Initialize a new tool-executor configuration\")\n  .action(async () => {\n    const configPath = resolve(process.cwd(), \"tool-executor.config.json\");\n\n    if (existsSync(configPath)) {\n      console.log(\"⚠️ Config file already exists\");\n      return;\n    }\n\n    const { writeFileSync } = await import(\"fs\");\n    const defaultConfig = {\n      servers: [\n        {\n          name: \"example\",\n          displayName: \"Example Server\",\n          command: \"npx\",\n          args: [\"-y\", \"example-mcp-server\"],\n        },\n      ],\n    };\n\n    writeFileSync(configPath, JSON.stringify(defaultConfig, null, 2));\n    console.log(\"✅ Created tool-executor.config.json\");\n    console.log(\"   Edit this file to add your MCP servers, then run: claudikins extract\");\n  });\n\nprogram\n  .command(\"extract\")\n  .description(\"Extract tool schemas from MCP servers into registry\")\n  .option(\"-a, --all\", \"Extract from all configured servers\")\n  .action(async (options: { all?: boolean }) => {\n    if (!options.all) {\n      console.log(\"Usage: claudikins extract --all\");\n      console.log(\"\\nExtracts tool schemas from all configured MCP servers\");\n      console.log(\"and generates YAML files in the registry/ directory.\");\n      return;\n    }\n\n    console.log(\"🔧 Extracting schemas from MCP servers...\\n\");\n\n    // Run the extract script via tsx\n    const scriptPath = resolve(proce Path?: string): ToolExecutorConfig | null {\n  const filepath = configPath || findConfigFile();\n  if (!filepath || !existsSync(filepath)) {\n    return null;\n  }\n\n  try {\n    const content = readFileSync(filepath, \"utf-8\");\n    const parsed = JSON.parse(content);\n    const expanded = expandEnvVarsInObject(parsed);\n    return ToolExecutorConfigSchema.parse(expanded);\n  } catch (error) {\n    console.error(`Failed to load config from ${filepath}:`, error);\n    return null;\n  }\n}\n"},"src/sandbox/clients.ts":{"language":"typescript","mutants":[{"id":"413","mutatorName":"StringLiteral","replacement":"``","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":199,"line":101},"start":{"column":19,"line":101}}},{"id":"414","mutatorName":"BooleanLiteral","replacement":"true","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":17,"line":102},"start":{"column":12,"line":102}}},{"id":"456","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":205},"start":{"column":16,"line":203}}},{"id":"366","mutatorName":"ConditionalExpression","replacement":"false","statusReason":"expected { name: 'override', …(4) } to match object { name: 'override', …(2) }\n(2 matching properties omitted from actual)","status":"Killed","static":false,"testsCompleted":1,"killedBy":["28"],"coveredBy":["6","28","29"],"location":{"end":{"column":61,"line":38},"start":{"column":10,"line":38}}},{"id":"370","mutatorName":"ConditionalExpression","replacement":"false","statusReason":"Cannot read properties of undefined (reading 'reduce')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["29"],"coveredBy":["6","29"],"location":{"end":{"column":39,"line":45},"start":{"column":7,"line":45}}},{"id":"361","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected [ 'trusted', 'override' ] to deeply equal [ 'safe', 'trusted', 'override' ]" klm\", displayName: \"NotebookLM\", command: \"npx\", args: [\"-y\", \"notebooklm-mcp\"] },\n  { name: \"sequentialThinking\", displayName: \"Sequential Thinking\", command: \"npx\", args: [\"-y\", \"@modelcontextprotocol/server-sequential-thinking\"] },\n  { name: \"context7\", displayName: \"Context7\", command: \"npx\", args: [\"-y\", \"@upstash/context7-mcp\"] },\n  { name: \"gemini\", displayName: \"Gemini\", command: \"npx\", args: [\"-y\", \"@rlabs-inc/gemini-mcp\"], envKeys: [\"GEMINI_API_KEY\"] },\n  { name: \"shadcn\", displayName: \"shadcn\", command: \"npx\", args: [\"-y\", \"shadcn-ui-mcp-server\"] },\n  { name: \"apify\", displayName: \"Apify\", command: \"npx\", args: [\"-y\", \"@apify/actors-mcp-server\"], envKeys: [\"APIFY_TOKEN\"] },\n  // Local binaries\n  { name: \"codebase-memory\", displayName: \"Codebase Memory\", command: \"codebase-memory-mcp\", trusted: true, commandEnvKey: \"CODEBASE_MEMORY_MCP_BIN\", args: [] },\n  // UVX servers (Python)\n  { name: \"serena\", displayName: \"Serena\", command: \"uvx\", args: [\"--from\", \"git+https://github.com/oraios/serena\", \"serena\", \"start-mcp-server\"] },\n];\n\nconst SAFE_SERVER_COMMANDS = new Set([\"npx\", \"uvx\", \"node\", \"python\", \"codebase-memory-mcp\"]);\n\n/**\n * Resolve optional command env override at runtime (after dotenv loads)\n */\nfunction resolveCommand(config: ServerConfig): string {\n  if (!config.commandEnvKey) return config.command;\n  return process.env[config.commandEnvKey] || config.command;\n}\n\n/**\n * Resolve envKeys to actual env values at runtime (after dotenv loads)\n */\nfunction resolveEnvKeys(envKeys?: string[]): Record<"+"string, string> | undefined {\n  if (!envKeys || envKeys.length === 0) return undefined;\n\n  return envKeys.reduce<"+"Record<"+"string, string>>((acc, key) => {\n    acc[key] = process.env[key] || \"\";\n    return acc;\n  }, {});\n}\n\n/**\n * Validate server commands to avoid accidental command injection from config\n */\nfunction isSa :14,"coveredBy":[],"location":{"end":{"column":10,"line":168},"start":{"column":3,"line":168}}},{"id":"634","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":".toMatch() expects to receive a string, but got undefined","status":"Killed","static":true,"testsCompleted":11,"killedBy":["20"],"coveredBy":[],"location":{"end":{"column":76,"line":175},"start":{"column":67,"line":175}}},{"id":"630","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":14,"coveredBy":[],"location":{"end":{"column":9,"line":172},"start":{"column":3,"line":172}}},{"id":"629","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":14,"coveredBy":[],"location":{"end":{"column":14,"line":171},"start":{"column":3,"line":171}}},{"id":"631","mutatorName":"ArrayDeclaration","replacement":"[]","status":"Survived","static":true,"testsCompleted":14,"coveredBy":[],"location":{"end":{"column":91,"line":175},"start":{"column":42,"line":175}}},{"id":"633","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":14,"coveredBy":[],"location":{"end":{"column":65,"line":175},"start":{"column":54,"line":175}}},{"id":"635","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":14,"coveredBy":[],"location":{"end":{"column":90,"line":175},"start":{"column":78,"line":175}}}],"source":"import { getClient, logMcpCall, SERVER_CONFIGS } from \"./clients.js\";\nimport { workspace } from \"./workspace.js\";\nimport { MAX_LOG_CHARS, MAX_LOG_ENTRY_CHARS, MCP_RESULTS_DIR } from \"../constants.js\";\nimport { ExecutionResult } from \"../types.js\";\n\nconst DEFAULT_TIMEOUT = 30_000; // 30 seconds\n\ntype ClientProxy = Record<"+"string, (args?: Record<"+"string, unknown>) => Promise<"+"unknown>>;\ntype MockConsole = {\n  log: (...args: unknown[]) => void;\n  info: (...args: unknown[]) => void;\n  warn: (...args: unknown[]) => void;\n  error: (...args: unknown[]) => void;\n  debug: (...args: unknown[]) => void;\n};\ntype SandboxGlobals = Record<"+"string, unknown> & {\n  console: MockConsole;\n  workspace: typeof workspace;\n  clients: Record<"+"string, ClientProxy>;\n};\n\n/**\n * Summarise logs aggressively to minimize context usage\n */\nfunction summariseLogs(logs: unknown[]): unknown[] {\n  if (logs.length === 0) return [];\n\n  const serialised = JSON.stringify(logs);\n  if (serialised.length <"+"= MAX_LOG_CHARS) {\n    return logs;\n  }\n\n  // Ultra-minimal summary - just confirmation + size\n  return [`Output truncated (${serialised.length} chars). Check workspace for full results.`];\n}\n\n/**\n * Create a proxy that wraps an MCP client's tool calls\n * Large responses are auto-saved to workspace, returning references\n */\nfunction createClientProxy(name: string): ClientProxy {\n  return new Proxy({} as ClientProxy, {\n    get(_, toolName) {\n      if (toolName === \"then\") {\n        return undefined;\n      }\n\n      if (typeof toolName !== \"string\") {\n        return undefined;\n      }\n\n      return async (args: Record<"+"string, unknown> = {}) => {\n        const client = await getClient(name);\n        if (!client) {\n          throw new Error(`${name} MCP is not available`);\n        }\n\n        const startTime = Date.now();\n        try {\n          const result = await client.callTool({ name: toolName, arguments: args });\n\n          logMcpCall({\n            timestamp: startTime,\n            client: name,\n            tool: toolName,\n            args,\n            duration: Date.now() - startTime,\n          });\n\n          // Check response size\n          const serialised = JSON.stringify(result);\n          if (serialised.length > MAX_LOG_ENTRY_CHARS) {\n            // Auto-save large responses to workspace\n            const filename = `${Date.now()}-${name}-${toolName}.json`;\n            const filepath = `${MCP_RESULTS_DIR}/${filename}`;\n            try  as globFs } from \"glob\";\nimport { MCP_RESULTS_DIR } from \"../constants.js\";\n\n// Resolve workspace relative to module location (not cwd) for plugin portability\nconst __dirname = dirname(fileURLToPath(import.meta.url));\nconst WORKSPACE_ROOT = resolve(__dirname, \"..\", \"..\", \"workspace\");\n\n/**\n * Resolve a path within the workspace, blocking traversal attacks\n */\nfunction resolvePath(relativePath: string): string {\n  const normalized = normalize(relativePath);\n\n  // Block absolute paths and traversal\n  if (normalized.startsWith(\"/\") || normalized.startsWith(\"..\") || normalized.includes(\"/../\")) {\n    throw new Error(`Path traversal blocked: ${relativePath}`);\n  }\n\n  const fullPath = resolve(WORKSPACE_ROOT, normalized);\n\n  // Double-check the resolved path is within workspace\n  if (!fullPath.startsWith(WORKSPACE_ROOT)) {\n    throw new Error(`Path traversal blocked: ${relativePath}`);\n  }\n\n  return fullPath;\n}\n\n/**\n * Clean up old MCP results (older than maxAge ms)\n * Default: 1 hour (3600000ms)\n */\nasync function cleanupMcpResults(maxAgeMs = 3600000): Promise<"+"number> {\n  const dir = join(WORKSPACE_ROOT, MCP_RESULTS_DIR);\n\n  try {\n    const files = await readdir(dir);\n    const now = Date.now();\n    let deleted = 0;\n\n    for (const file of files) {\n      const filepath = join(dir, file);\n      const stats = await fsStat(filepath);\n\n      if (now - stats.mtimeMs > maxAgeMs) {\n        await unlink(filepath);\n        deleted++;\n      }\n    }\n\n    return deleted;\n  } catch (err) {\n    // ENOENT is expected if directory doesn't exist yet\n    if ((err as NodeJS.ErrnoException).code === \"ENOENT\") {\n      return 0;\n    }\n\n    // Log unexpected errors (permissions, disk full, etc.)\n    console.error(\"cleanupMcpResults failed:\", err);\n    return 0;\n  }\n}\n\n/**\n * Workspace API - all file operations scoped to ./workspace/\n */\nexport const workspace = {\n  // Core operations\n  async read(path: string): Promise<"+"string> {\n    const fullPath = resolvePath(path);\n    return readFile(fullPath, \"utf-8\");\n  },\n\n  async write(path: string, data: string): Promise<"+"void> {\n    const fullPath = resolvePath(path);\n    await writeFile(fullPath, data, \"utf-8\");\n  },\n\n  async append(path: string, data: string): Promise<"+"void> {\n    const fullPath = resolvePath(path);\n    await appendFile(fullPath, data, \"utf-8\");\n  },\n\n  async delete(path: string): Promise<"+"void> {\n    const fullPath = resolvePath(path);\n    await unlink(fullPath);\n  },\n\n  // JSON operations\n  async readJSON<"+"T = unknown>(path: string): Promise<"+"T> {\n    const content = await workspace.read(path);\n    return JSON.parse(content) as T;\n  },\n\n  async writeJSON(path: string, data: unknown): Promise<"+"void> {\n    await workspace.write(path, JSON.stringify(data, null, 2));\n  },\n\n  // Binary operations\n  async readBuffer(path: string): Promise<"+"Buffer> {\n    const fullPath = resolvePath(path);\n    return readFile(fullPath);\n  },\n\n  async writeBuffer(path: string, data: Buffer): Promise<"+"void> {\n    const fullPath = resolvePath(path);\n    await writeFile(fullPath, data);\n  },\n\n  // Directory operations\n  async list(path = \".\"): Promise<"+"string[]> {\n    const fullPath = resolvePath(path);\n    return readdir(fullPath);\n  },\n\n  async glob(pattern: string): Promise<"+"string[]> {\n    // Block dangerous patterns\n    if (pattern.includes(\"..\")) {\n      throw new Error(`Glob traversal blocked: ${pattern}`);\n    }\n\n    const matches = await globFs(pattern, {\n      cwd: WORKSPACE_ROOT,\n      nodir: false,\n    });\n\n    return matches;\n  },\n\n  async mkdir(path: string): Promise<"+"void> {\n    const fullPath = resolvePath(path);\n    await fsMkdir(fullPath, { recursive: true });\n  },\n\n  async exists(path: string): Promise<"+"boolean> {\n    try {\n      const fullPath = resolvePath(path);\n      await fsStat(fullPath);\n      return true;\n    } catch (err) {\n      // ENOENT means file doesn't exist - expected\n      if ((err as NodeJS.ErrnoException).code === \"ENOENT\") {\n        return false;\n      }\n\n      // Rethrow unexpected errors (permissions, etc.)\n      throw err;\n    }\n  },\n\n  // Metadata\n  async stat(path: string): Promise<"+"{ size: number; mtime: Date; isDir: boolean }> {\n    const fullPath = resolvePath(path);\n    const stats = await fsStat(fullPath);\n    return {\n      size: stats.size,\n      mtime: stats.mtime,\n      isDir: stats.isDirectory(),\n    };\n  },\n\n  // MCP results management\n  cleanupMcpResults,\n};\n\nexport type Workspace = typeof workspace;\n"},"src/search.ts":{"language":"typescript","mutants":[{"id":"814","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":60},"start":{"column":26,"line":58}}},{"id":"874","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":158},"start":{"column":60,"line":156}}},{"id":"904","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":4,"line":198},"start":{"column":19,"line":195}}},{"id":"905","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":42,"line":196},"start":{"column":19,"line":196}}},{"id":"921","mutatorName":"BlockStatement","replacement":"{}","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":6,"line":230},"start":{"column":21,"line":228}}},{"id":"922","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":49,"line":229},"start":{"column":21,"line":229}}},{"id":"952","mutatorName":"StringLiteral","replacement":"\"Stryker was here!\"","status":"NoCoverage","static":false,"co t | null> {\n  // Already connected\n  if (registrySerena) return registrySerena;\n\n  // Connection already in progress - wait for it\n  if (connectionPromise) {\n    return connectionPromise;\n  }\n\n  // Start new connection\n  connectionPromise = connectRegistrySerena();\n  try {\n    return await connectionPromise;\n  } finally {\n    connectionPromise = null;\n  }\n}\n\n/**\n * Internal connection logic for registry Serena\n */\nasync function connectRegistrySerena(): Promise<"+"Client | null> {\n  try {\n    const client = new Client({ name: \"claudikins-registry-search\", version: \"1.1.0\" }, { capabilities: {} });\n    const transport = new StdioClientTransport({\n      command: \"uvx\",\n      args: [\"--from\", \"git+https://github.com/oraios/serena\", \"serena\", \"start-mcp-server\"],\n      env: process.env as Record<"+"string, string>,\n    });\n\n    await client.connect(transport);\n\n    // Activate the registry project\n    await client.callTool({\n      name: \"activate_project\",\n      arguments: { project: REGISTRY_ROOT },\n    });\n\n    registrySerena = client;\n    console.error(\"Registry Serena connected and project activated\");\n    return client;\n  } catch (error) {\n    console.error(\"Failed to connect registry Serena:\", error);\n    return null;\n  }\n}\n\n/**\n * Load a tool definition from a YAML file\n */\nexport async function loadToolDefinition(filePath: string): Promise<"+"ToolDefinition | null> {\n  try {\n    const content = await readFile(filePath, \"utf-8\");\n    const parsed = yaml.load(content) as ToolDefinition;\n\n    // Validate required fields\n    if (!parsed.name || !parsed.server || !parsed.description) {\n      console.error(`Invalid tool definition: ${filePath}`);\n      return null;\n    }\n\n    return parsed as ToolDefinition;\n  } catch (error) {\n    console.error(`Failed to load tool: ${filePath}`, error);\n    return null;\n  }\n}\n\n/**\n * Search tools using Registry Serena (dedicated instance for tool search)\n */\nasync function searchWithSerena(query: string, limit: number): Promise<"+"SearchResult[] | null> {\n  try {\n    const serena = await getRegistrySerena();\n    if (!serena) {\n      return null;\n    }\n\n    // Convert query to flexible regex with lookaheads for ANY order matching\n    // \"generate image banana\" → \"(?=.*generate)(?=.*image)(?=.*banana)\"\n    // This matches files containing ALL terms regardless of order\n    const terms = query\n      .split(/\\s+/)\n      .map(term => term.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&')); // escape regex chars\n\n    // Use lookaheads so terms can appear in any order\n    // Single term: just use it directly. Multiple terms: use lookaheads\n    const pattern = terms.length === 1\n      ? terms[0]\n      : terms.map(t => `(?=.*${t})`).join('') + '.*';\n\n    // Use Serena's search_for_pattern to find matches in registry\n    // relative_path is \".\" since registry project is already activated\n    const result = await serena.callTool({\n      name: \"search_for_pattern\",\n      arguments: {\n        substring_pattern: pattern,\n        relative_path: \".\",\n        context_lines_before: 2,\n        context_lines_after: 2,\n      },\n    }) as { content?: SerenaContentItem[] };\n\n    if (!result.content || !Array.isArray(result.content)) {\n      return null;\n    }\n\n    // Parse Serena results and load corresponding tool definitions\n    const results: SearchResult[] = [];\n    const seenFiles = new Set<"+"string>();\n\n    for (const item of result.content) {\n      if (item.type !== \"text\") continue;\n\n      // Extract file paths from Serena output (relative to registry root)\n      const text = item.text;\n\n      // Match paths like \"ui/mermaid/generate_diagram.yaml\", \"knowledge/context7/query-docs.yaml\", or\n      // \"reasoning/sequentialThinking/sequentialthinking.yaml\"\n      const fileMatches = text.match(/[A-Za-z0-9_.-]+\\/[A-Za-z0-9_.-]+\\/[^\\s:]+\\.ya?ml/gi);\n\n      if (fileMatches) {\n        for (const match of fileMatches) {\n          if (seenFiles.has(match)) continue;\n          seenFiles.add(match);\n\n          const fullPath = resolve(REGISTRY_ROOT, match);\n          const tool = await loadToolDefinition(fullPath);\n          if (tool) {\n            results.push({\n              tool,\n              score: 1.0, // Serena doesn't provide scores\n              matchContext: text.slice(0, 200),\n            });\n          }\n\n          if (results.length >= limit) break;\n        }\n      }\n    }\n\n    return results;\n  } catch (error) {\n    console.error(\"Serena search failed:\", error);\n    return null;\n  }\n}\n\n/**\n * Load all tools for BM25 indexing\n */\nasync function loadAllTools(): Promise<"+"ToolDefinition[]> {\n  const files = await glob(\"**/*.{yaml,yml}\", {\n    cwd: REGISTRY_ROOT,\n    absolute: true,\n  });\n\n  const tools: ToolDefinition[] = [];\n  for (const file of files) {\n    const tool = await loadToolDefinition(file);\n    if (tool) tools.push(tool);\n  }\n  return tools;\n}\n\n/**\n * Search tools using local glob + text matching (fallback)\n */\nasync function searchLocally(query: string, limit: number): Promise<"+"SearchResult[]> {\n  // Try BM25 first (better ranking)\n  if (!isBM25Ready()) {\n    try {\n      const allTools = await loadAllTools();\n      initBM25(allTools);\n      console.error(`BM25 index built with ${allTools.length} tools`);\n    } catch (error) {\n      console.error(\"Failed to initialize BM25:\", error);\n    }\n  }\n\n  if (isBM25Ready()) {\n    const bm25Results = searchBM25(query, limit);\n    if (bm25Results.length > 0) {\n      return bm25Results.map((tool, idx) => ({\n        tool,\n        score: 1 - (idx * 0.01), // Decreasing score for ranking\n      }));\n    }\n  }\n\n  // Fall back to simple text matching\n  const queryLower = query.toLowerCase();\n  const queryTerms = queryLower.split(/\\s+/).filter(Boolean);\n  const files = await glob(\"**/*.{yaml,yml}\", {\n    cwd: REGISTRY_ROOT,\n    absolute: true,\n  });\n\n  const results: SearchResult[] = [];\n\n  for (const file of files) {\n    const tool = await loadToolDefinition(file);\n    if (!tool) continue;\n\n    // Score based on term matches\n    const searchText = `${tool.name} ${tool.description} ${tool.category || \"\"} ${tool.server}`.toLowerCase();\n    let score = 0;\n\n    for (const term of queryTerms) {\n      if (searchText.includes(term)) {\n        score += 1;\n        // Bonus for name/category match\n        if (tool.name.toLowerCase().includes(term)) score += 2;\n        if (tool.category?.toLowerCase().includes(term)) score += 1;\n      }\n    }\n\n    if (score > 0) {\n      results.push({\n        tool,\n        score: score / queryTerms.length,\n      });\n    }\n  }\n\n  // Sort by score descending\n  results.sort((a, b) => b.score - a.score);\n  return results.slice(0, limit);\n}\n\n/**\n * Search for tools matching a query\n */\nexport async function searchTools(query: string, limit = 10, offset = 0): Promise<"+"SearchResponse> {\n  // Request more results to support pagination\n  const fetchLimit = offset + limit;\n\n  // Try Serena first\n  const serenaResults = await searchWithSerena(query, fetchLimit);\n  if (serenaResults && serenaResults.length > 0) {\n    const paginatedResults = serenaResults.slice(offset, offset + limit);\n    return {\n      results: paginatedResults,\n      source: \"serena\",\n      totalCount: serenaResults.length,\n    };\n  }\n\n  // Fall back to local search\n  const localResults = await searchLocally(query, fetchLimit);\n  const fallbackReason = serenaResults === null\n    ? \"Serena unavailable - using text search\"\n    : \"No semantic matches - using text search\";\n\n  if (localResults.length === 0) {\n    return {\n      results: [],\n      source: \"local\",\n      totalCount: 0,\n      fallbackReason,\n      suggestion: \"Try broader terms like 'image', 'code search', 'graph analysis', 'diagram', or browse categories: code-nav, graph-analysis, knowledge, ai-models, web, ui\",\n    };\n  }\n\n  const paginatedResults = localResults.slice(offset, offset + limit);\n  return {\n    results: paginatedResults,\n    source: \"local\",\n    totalCount: localResults.length,\n    fallbackReason,\n  };\n}\n\n/**\n * Get all available categories in the registry\n */\nexport async function getCategories(): Promise<"+"string[]> {\n  const files = await glob(\"*/\", {\n    cwd: REGISTRY_ROOT,\n  });\n\n  // Remove trailing slashes\n  return files.map((f) => f.replace(/\\/$/, \"\"));\n}\n\n/**\n * List all tools in a category\n */\nexport async function listToolsInCategory(category: string): Promise<"+"ToolDefinition[]> {\n  const categoryPath = resolve(REGISTRY_ROOT, category);\n  const files = await glob(\"**/*.{yaml,yml}\", {\n    cwd: categoryPath,\n    absolute: true,\n  });\n\n  const tools: ToolDefinition[] = [];\n  for (const file of files) {\n    const tool = await loadToolDefinition(file);\n    if (tool) tools.push(tool);\n  }\n  return tools;\n}\n\n/**\n * Get a specific tool by name (for full schema retrieval)\n */\nexport async function getToolByName(toolName: string): Promise<"+"ToolDefinition | null> {\n  // Search all YAML files in registry\n  const files = await glob(\"**/*.{yaml,yml}\", {\n    cwd: REGISTRY_ROOT,\n    absolute: true,\n  });\n\n  for (const file of files) {\n    const tool = await loadToolDefinition(file);\n    if (tool && tool.name === toolName) {\n      return tool;\n    }\n  }\n\n  return null;\n}\n\n/**\n * Disconnect the registry Serena client (for cleanup)\n */\nexport async function disconnectRegistrySerena(): Promise<"+"void> {\n  if (registrySerena) {\n    try {\n      await registrySerena.close();\n      console.error(\"Registry Serena disconnected\");\n    } catch (error) {\n      console.error(\"Error disconnecting registry Serena:\", error);\n    }\n    registrySerena = null;\n  }\n}\n"},"src/bm25.ts":{"language":"typescrip : string }[];\n  structuredContent: {\n    suggestion?: string | undefined;\n    fallbackReason?: string | undefined;\n    results: {\n      name: string;\n      server: string;\n      description: string;\n    }[];\n    count: number;\n    limit: number;\n    offset: number;\n    totalCount: number | undefined;\n    has_more: boolean;\n    source: \"serena\" | \"local\";\n  };\n}> {\n  const response = await searchTools(params.query, params.limit, params.offset);\n\n  const output = {\n    results: response.results.map((r) => ({\n      name: r.tool.name,\n      server: r.tool.server,\n      description: oneLiner(r.tool.description),\n    })),\n    // Pagination metadata (MCP best practice)\n    count: response.results.length,\n    limit: params.limit,\n    offset: params.offset,\n    totalCount: response.totalCount,\n    has_more: (params.offset + response.results.length) <"+" (response.totalCount || 0),\n    // Source info\n    source: response.source,\n    ...(response.fallbackReason && { fallbackReason: response.fallbackReason }),\n    ...(response.suggestion && { suggestion: response.suggestion }),\n  };\n\n  return {\n    content: [{ type: \"text\", text: JSON.stringify(output, null, 2) }],\n    structuredContent: output,\n  };\n}\n"},"src/constants.ts":{"language":"typescript","mutants":[{"id":"244","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"promise rejected \"Error: ENOENT: no such file or directory,… { …(4) }\" instead of resolving","status":"Killed","static":true,"testsCompleted":13,"killedBy":["20"],"coveredBy":["22","23"],"location":{"end":{"column":45,"line":11},"start":{"column":32,"line":11}}}],"source":"/**\n * Context management constants - AGGRESSIVE limits to minimize context usage\n */\n// Maximum characters to return in console.log output (keep minimal!)\nexport const MAX_LOG_CHARS = 500;\n\n// Maximum characters per individual log entry\nexport const MAX_LOG_ENTRY_CHARS = 200;\n\n// Directory for auto-saved MCP responses\nexport const MCP_RESULTS_DIR = \"mcp-results\";\n"},"src/schemas.ts":{"language":"typescript","mutants":[{"id":"787","mutatorName":"ObjectLiteral","replacement":"{}","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":2,"line":21},"start":{"column":48,"line":6}}},{"id":"788","mutatorName":"MethodExpression","replacement":"z.string().max(1, \"Query cannot be empty\")","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":37,"line":8},"start":{"column":10,"line":7}}},{"id":"789","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":36,"line":8},"start":{"column":13,"line":8}}},{"id":"792","mutatorName":"MethodExpression","replacement":"z.number().int().max(1)","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":12,"line":12},"start":{"column":10,"line":10}}},{"id":"791","mutatorName":"MethodExpression","replacement":"z.number().int().min(1).min(50)","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":13,"line":13},"start":{"column":10,"line":10}}},{"id":"790","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":56,"line":9},"start":{"column":15,"line":9}}},{"id":"795","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":70,"line":20},"start":{"column":15,"line":20}}},{"id":"793","mutatorName":"StringLiteral","replacement":"\"\"","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"column":55,"line":15},"start":{"column":15,"line":15}}},{"id":"796","mutatorName":"ObjectLiteral","replacement":"{}","status":"Survived","static":true,"testsCompleted":6,"coveredBy":[],"location":{"end":{"col
