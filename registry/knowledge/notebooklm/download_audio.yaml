name: download_audio
server: notebooklm
category: knowledge
description: >-
  Save the completed Audio Overview to disk as a `.m4a` file. **Pre-condition:** `get_audio_status` must report `status:
  "ready"`. Calling this before generation completes returns an error message explaining what to do.


  The file lands in `destination_dir` with NotebookLM's suggested filename (sanitised — usually the audio's title with
  underscores). The full saved path is returned in `result.filePath`.
inputSchema:
  type: object
  properties:
    destination_dir:
      type: string
      description: >-
        Absolute directory path where the file is saved (created if missing). Example:
        `/Users/jane/Downloads/notebooklm` or `/tmp/audio`. Relative paths are NOT recommended — the server may run from
        a different working directory than the caller.
    show_browser:
      type: boolean
      description: 'Show the browser window for debugging. Default: false.'
    session_id:
      type: string
      description: >-
        Reuse an existing browser session by id. Recommended when you have already called `ask_question` against the
        same notebook — saves the 10–15 s page-load time. Obtain from `list_sessions` or any prior `ask_question`
        response (`result.session_id`).
    notebook_id:
      type: string
      description: >-
        Library notebook id (from `list_notebooks` / `search_notebooks`). Defaults to the active notebook (see
        `select_notebook`) when omitted.
    notebook_url:
      type: string
      description: >-
        Direct NotebookLM URL — overrides `notebook_id`. Use for ad-hoc notebooks not yet in your library. Format:
        `https://notebooklm.google.com/notebook/<uuid>`.
  required:
    - destination_dir
example: |-
  await notebooklm["download_audio"]({
    destination_dir: "<destination_dir>",
    show_browser: true,
    session_id: "<session_id>"
  });
