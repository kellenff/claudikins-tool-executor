name: add_notebook
server: notebooklm
category: knowledge
description: >-
  Register a NotebookLM notebook in the local library so it can be queried with `ask_question`, ingested into with
  `add_source`, etc.


  ## Required URL

  The user must supply a NotebookLM share-link. To produce one:
    1. Open https://notebooklm.google
    2. Open the notebook → click "Share" (top right)
    3. Set "Anyone with the link" → "Copy link"

  ## Permission workflow

  Do NOT call this tool unprompted. The expected dialogue is:
    1. Ask for the URL
    2. Ask what knowledge it contains (1–2 sentences) → `description`
    3. Ask which topics it covers (3–5) → `topics`
    4. Ask when it should be consulted → `use_cases`
    5. Propose a `name` and the metadata back to the user
    6. Only after explicit confirmation, call `add_notebook`.

  Free-tier limits: 100 notebooks · 50 sources each · 50 queries/day. Google AI Pro/Ultra raises these 5×.
inputSchema:
  type: object
  properties:
    url:
      type: string
      description: >-
        NotebookLM share URL. Format: `https://notebooklm.google.com/notebook/<uuid>` (with optional `?authuser=N`
        suffix).
    name:
      type: string
      description: Display name (e.g. 'n8n Documentation').
    description:
      type: string
      description: 1–2 sentence summary of what the notebook contains.
    topics:
      type: array
      items:
        type: string
      description: 3–5 topics covered. Used by `search_notebooks`.
    content_types:
      type: array
      items:
        type: string
      description: Content classification, e.g. ['documentation', 'examples', 'best practices'].
    use_cases:
      type: array
      items:
        type: string
      description: When the LLM should consult this notebook, e.g. ['Implementing n8n workflows'].
    tags:
      type: array
      items:
        type: string
      description: Optional free-form tags for organisation.
  required:
    - url
    - name
    - description
    - topics
example: |-
  await notebooklm["add_notebook"]({
    url: "<url>",
    name: "<name>",
    description: "<description>"
  });
