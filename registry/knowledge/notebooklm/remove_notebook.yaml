name: remove_notebook
server: notebooklm
category: knowledge
description: >-
  Remove a notebook from the local library. **Does NOT delete the actual NotebookLM notebook on Google's side** — only
  the local metadata entry. Active sessions on this notebook are closed.


  Confirmation workflow: look up the notebook by id, ask the user "Remove '[name]' from your library?" — only call after
  a clear yes.
inputSchema:
  type: object
  properties:
    id:
      type: string
      description: Notebook id to remove (from `list_notebooks`).
  required:
    - id
example: |-
  await notebooklm["remove_notebook"]({
    id: "<id>"
  });
