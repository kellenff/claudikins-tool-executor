name: update_notebook
server: notebooklm
category: knowledge
description: >-
  Patch metadata fields on an existing notebook. Pass `id` plus any subset of `name`, `description`, `topics`,
  `content_types`, `use_cases`, `tags`, `url` — only supplied fields change.


  Workflow: identify the target notebook → propose the exact change back to the user → call only after explicit
  confirmation. Multiple fields can be updated in one call.
inputSchema:
  type: object
  properties:
    id:
      type: string
      description: Notebook id to update (from `list_notebooks`).
    name:
      type: string
      description: New display name.
    description:
      type: string
      description: New 1–2 sentence summary.
    topics:
      type: array
      items:
        type: string
      description: Replacement topics list (full replacement, not append).
    content_types:
      type: array
      items:
        type: string
      description: Replacement content classification.
    use_cases:
      type: array
      items:
        type: string
      description: Replacement use-cases.
    tags:
      type: array
      items:
        type: string
      description: Replacement tags.
    url:
      type: string
      description: New NotebookLM share URL (rarely needed).
  required:
    - id
example: |-
  await notebooklm["update_notebook"]({
    id: "<id>",
    name: "<name>",
    description: "<description>"
  });
