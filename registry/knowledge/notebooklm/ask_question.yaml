name: ask_question
server: notebooklm
category: knowledge
description: >-
  # Conversational Research Partner (NotebookLM • Gemini 2.5 • Session RAG)


  ## No Active Notebook

  - Visit https://notebooklm.google to create a notebook and get a share link

  - Use **add_notebook** to add it to your library (explains how to get the link)

  - Use **list_notebooks** to show available sources

  - Use **select_notebook** to set one active


  > Auth tip: If login is required, use the prompt 'notebooklm.auth-setup' and then verify with the 'get_health' tool.
  If authentication later fails (e.g., expired cookies), use the prompt 'notebooklm.auth-repair'.


  Tip: Tell the user you can manage NotebookLM library and ask which notebook to use for the current task.
inputSchema:
  type: object
  properties:
    question:
      type: string
      description: >-
        The question to ask NotebookLM. Plain natural language; can be multi-line. Gemini responds grounded on the
        notebook's sources.
    session_id:
      type: string
      description: >-
        Reuse an existing browser session for follow-up questions. Pass back the `session_id` returned in a prior
        `ask_question` response — NotebookLM keeps the prior conversation in context, so follow-ups get sharper. Omit
        for a fresh session. `list_sessions` enumerates live sessions.
    notebook_id:
      type: string
      description: >-
        Library notebook id (from `list_notebooks` / `search_notebooks`). Defaults to the active notebook (see
        `select_notebook`) when omitted.
    notebook_url:
      type: string
      description: >-
        Direct NotebookLM URL — overrides `notebook_id`. Use for ad-hoc queries against notebooks not yet in your
        library. Format: `https://notebooklm.google.com/notebook/<uuid>`.
    source_format:
      type: string
      enum:
        - none
        - inline
        - footnotes
        - json
      description: >-
        How citations are returned alongside the answer:
          • `none` (default) — raw answer, no citation extraction (fastest)
          • `footnotes` — answer plus a `Sources:` block, e.g. `[1] DocName — "excerpt…"`
          • `inline` — `[N]` markers in the answer are replaced with `[N] (DocName: "excerpt…")`
          • `json` — answer text untouched; structured `sources` array on the response

        Use `none` for snappy chat. Use `json` when downstream code needs to process citations programmatically. Use
        `footnotes`/`inline` when showing the answer to a human reader.
    show_browser:
      type: boolean
      description: >-
        Show browser window for debugging (simple version). For advanced control (typing speed, stealth, etc.), use
        browser_options instead.
    browser_options:
      type: object
      description: >-
        Optional browser behavior settings. Claude can control everything: visibility, typing speed, stealth mode,
        timeouts. Useful for debugging or fine-tuning.
      properties:
        show:
          type: boolean
          description: 'Show browser window (default: from ENV or false)'
        headless:
          type: boolean
          description: 'Run browser in headless mode (default: true)'
        timeout_ms:
          type: number
          description: 'Browser operation timeout in milliseconds (default: 30000)'
        stealth:
          type: object
          description: Human-like behavior settings to avoid detection
          properties:
            enabled:
              type: boolean
              description: 'Master switch for all stealth features (default: true)'
            random_delays:
              type: boolean
              description: 'Random delays between actions (default: true)'
            human_typing:
              type: boolean
              description: 'Human-like typing patterns (default: true)'
            mouse_movements:
              type: boolean
              description: 'Realistic mouse movements (default: true)'
            typing_wpm_min:
              type: number
              description: 'Minimum typing speed in WPM (default: 160)'
            typing_wpm_max:
              type: number
              description: 'Maximum typing speed in WPM (default: 240)'
            delay_min_ms:
              type: number
              description: 'Minimum delay between actions in ms (default: 100)'
            delay_max_ms:
              type: number
              description: 'Maximum delay between actions in ms (default: 400)'
        viewport:
          type: object
          description: Browser viewport size
          properties:
            width:
              type: number
              description: 'Viewport width in pixels (default: 1920)'
            height:
              type: number
              description: 'Viewport height in pixels (default: 1080)'
  required:
    - question
example: |-
  await notebooklm["ask_question"]({
    question: "<question>",
    session_id: "<session_id>",
    notebook_id: "<notebook_id>"
  });
