name: cleanup_data
server: notebooklm
category: knowledge
description: >-
  Two-phase deep cleanup of all server data on disk (auth state, browser profiles, caches, MCP logs, temp backups).
  Cross-platform (Linux/macOS/Windows). Always close all Chrome/Chromium instances first — open browsers can lock files.


  Phase 1 (preview): call with `confirm: false`. Returns a categorised list of paths and total size. **No deletion
  happens.**

  Phase 2 (delete): after the user reviews the preview and approves, call with `confirm: true`.


  Set `preserve_library: true` to keep the notebook library file (library.json) while wiping everything else —
  recommended when troubleshooting auth.


  Typical recovery flow:
    1. cleanup_data(confirm=false, preserve_library=true)  // preview
    2. cleanup_data(confirm=true, preserve_library=true)   // execute
    3. setup_auth (or re_auth)
inputSchema:
  type: object
  properties:
    confirm:
      type: boolean
      description: false = preview only (default). true = actually delete after user reviewed the preview.
    preserve_library:
      type: boolean
      description: >-
        Keep notebook library.json while deleting everything else. Default: false. Set true when only auth/browser state
        is broken.
      default: false
  required:
    - confirm
example: |-
  await notebooklm["cleanup_data"]({
    confirm: true,
    preserve_library: true
  });
