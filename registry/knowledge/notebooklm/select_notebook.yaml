name: select_notebook
server: notebooklm
category: knowledge
description: >-
  Mark a notebook as the active default. After this, `ask_question`, `add_source`, and the audio tools resolve to that
  notebook when the caller omits `notebook_id` / `notebook_url`.


  When to call:
    • The user explicitly switches context (e.g. "Let's work on React now")
    • Task obviously needs a different notebook than the current one — announce the switch ("Switching to the React notebook…") before calling.
    • If the right notebook is ambiguous, ask the user first instead of guessing.
inputSchema:
  type: object
  properties:
    id:
      type: string
      description: Notebook id to activate (from `list_notebooks`).
  required:
    - id
example: |-
  await notebooklm["select_notebook"]({
    id: "<id>"
  });
