name: re_auth
server: notebooklm
category: knowledge
description: >-
  Switch to a different Google account or recover from broken auth. Closes all active sessions, deletes saved cookies
  and Chrome profile, and opens a fresh login browser.


  Common triggers:
    • NotebookLM's 50 queries/day free-tier limit is reached and the user wants to rotate to another Google account
    • `setup_auth` failed and a clean slate is needed

  After login, call `get_health` to verify. For very stuck states, run `cleanup_data(confirm=true,
  preserve_library=true)` before `re_auth`.
inputSchema:
  type: object
  properties:
    show_browser:
      type: boolean
      description: 'Show the browser window. Default: true.'
    browser_options:
      type: object
      properties:
        show:
          type: boolean
        headless:
          type: boolean
        timeout_ms:
          type: number
example: |-
  await notebooklm["re_auth"]({
    show_browser: true,
    browser_options: {}
  });
