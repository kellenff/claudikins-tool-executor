name: reset_session
server: notebooklm
category: knowledge
description: >-
  Clear a session's chat history while keeping the same session id. Use this when the task changes mid-conversation and
  you want a fresh context without losing the underlying browser tab. Ask the user before resetting if they might still
  need the prior history.
inputSchema:
  type: object
  properties:
    session_id:
      type: string
      description: Session id to reset. Obtain from `list_sessions` or from a prior `ask_question` response (`result.session_id`).
  required:
    - session_id
example: |-
  await notebooklm["reset_session"]({
    session_id: "<session_id>"
  });
