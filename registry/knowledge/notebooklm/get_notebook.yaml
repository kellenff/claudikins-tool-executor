name: get_notebook
server: notebooklm
category: knowledge
description: >-
  Fetch full metadata for one notebook by id. Use to verify what's currently stored before calling `update_notebook`, or
  to show the user the exact `description`/`topics`/`use_cases` Claude has for it.
inputSchema:
  type: object
  properties:
    id:
      type: string
      description: Notebook id, as returned by `list_notebooks`/`search_notebooks`.
  required:
    - id
example: |-
  await notebooklm["get_notebook"]({
    id: "<id>"
  });
