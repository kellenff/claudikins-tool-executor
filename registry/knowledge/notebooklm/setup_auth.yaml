name: setup_auth
server: notebooklm
category: knowledge
description: >-
  Open a browser window for first-time Google login. Returns immediately after spawning the browser; the user has up to
  10 minutes to complete sign-in, then cookies are persisted for future runs.


  When to use:
    • `get_health` reports `authenticated=false` for the first time
    • Auto-login credentials are not configured
    • `re_auth` is the right call when you want to *switch* accounts or recover from a daily-quota lockout

  After login finishes, call `get_health` to verify success.


  If the browser session feels broken (auth keeps failing, stale cookies), run `cleanup_data(confirm=true,
  preserve_library=true)` first, then retry `setup_auth`.
inputSchema:
  type: object
  properties:
    show_browser:
      type: boolean
      description: >-
        Show the browser window. Default: true (must be visible so the user can interact). For advanced control use
        `browser_options`.
    browser_options:
      type: object
      description: 'Advanced browser settings. Override visibility, timeout, or headless mode (default: visible, 30 s).'
      properties:
        show:
          type: boolean
        headless:
          type: boolean
        timeout_ms:
          type: number
example: |-
  await notebooklm["setup_auth"]({
    show_browser: true,
    browser_options: {}
  });
