name: add_source
server: notebooklm
category: knowledge
description: >-
  Ingest a source into a NotebookLM notebook. Supports two source types in v2.0:
    ‚Ä¢ `url` ‚Äî NotebookLM crawls and indexes a website
    ‚Ä¢ `text` ‚Äî paste raw text (treated as a copied document)

  File / YouTube / Google-Drive uploads are not yet implemented.


  Returns `sourceCountBefore`/`sourceCountAfter` so the caller can verify the new source landed. Call once per source ‚Äî
  multiple sources require multiple calls. NotebookLM finishes indexing within 5‚Äì30 seconds; subsequent `ask_question`
  calls then have the new source in context. Free notebooks cap at 50 sources.


  Known quirk: pasted-text uploads occasionally redirect to a freshly created "Untitled notebook" on Google's side. The
  tool detects this and returns a clear error so you can re-try against the correct URL.
inputSchema:
  type: object
  properties:
    type:
      type: string
      enum:
        - url
        - text
      description: '`url` crawls the supplied website; `text` ingests `content` verbatim as a copied document.'
    content:
      type: string
      description: >-
        When `type=url`: a fully-qualified URL (https://‚Ä¶). When `type=text`: the raw text body (any length up to
        NotebookLM's per-source word limit, ~500 k for free tier).
    title:
      type: string
      description: >-
        Display title shown in the source list. Optional ‚Äî NotebookLM picks a sensible default (page title for URLs,
        first line for text). For text sources, supplying a title is recommended for later identification.
    show_browser:
      type: boolean
      description: 'Show the browser window for debugging. Default: false.'
    session_id:
      type: string
      description: >-
        Reuse an existing browser session by id. Recommended when you have already called `ask_question` against the
        same notebook ‚Äî saves the 10‚Äì15 s page-load time. Obtain from `list_sessions` or any prior `ask_question`
        response (`result.session_id`).
    notebook_id:
      type: string
      description: >-
        Library notebook id (from `list_notebooks` / `search_notebooks`). Defaults to the active notebook (see
        `select_notebook`) when omitted.
    notebook_url:
      type: string
      description: >-
        Direct NotebookLM URL ‚Äî overrides `notebook_id`. Use for ad-hoc notebooks not yet in your library. Format:
        `https://notebooklm.google.com/notebook/<uuid>`.
  required:
    - type
    - content
example: |-
  await notebooklm["add_source"]({
    type: "<type>",
    content: "<content>",
    title: "<title>"
  });
