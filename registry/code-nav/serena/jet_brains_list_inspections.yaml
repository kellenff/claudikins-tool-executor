name: jet_brains_list_inspections
server: serena
category: code-nav
description: >-
  Lists the available IDE inspections. Use this to discover which inspections can be passed

  to the run_inspections tool's `inspection_names` parameter. Returns JSON string with the list of available inspections
  including name, group path, and language.
inputSchema:
  type: object
  properties:
    language:
      anyOf:
        - type: string
        - type: 'null'
      default: null
      title: Language
      description: Optional language to filter by (e.g. "Java", "Python", "Kotlin").
    group_path_contains:
      anyOf:
        - type: string
        - type: 'null'
      default: null
      title: Group Path Contains
      description: |-
        Optional substring to match against the inspection group path
        (e.g. "probable bugs", "code style").
    max_answer_chars:
      default: -1
      title: Max Answer Chars
      type: integer
      description: |-
        Max characters for the JSON result. If exceeded, no content is returned.
        -1 means the default value from the config will be used.
  title: applyArguments
example: |-
  await serena["jet_brains_list_inspections"]({
    language: "<language>",
    group_path_contains: "<group_path_contains>",
    max_answer_chars: 0
  });
