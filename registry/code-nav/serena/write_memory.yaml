name: write_memory
server: serena
category: code-nav
description: |-
  Write information (utf-8-encoded) about this project that can be useful for future tasks to a memory in md format.
  The memory name should be meaningful and can include "/" to organize into topics (e.g., "auth/login/logic").
  If explicitly instructed, use the "global/" prefix for writing a memory that is shared across projects
  (e.g., "global/java/style_guide").
inputSchema:
  type: object
  properties:
    memory_name:
      title: Memory Name
      type: string
    content:
      title: Content
      type: string
    max_chars:
      default: -1
      title: Max Chars
      type: integer
      description: |-
        The maximum number of characters to write. By default, determined by the config,
        change only if instructed to do so.
  required:
    - memory_name
    - content
  title: applyArguments
example: |-
  await serena["write_memory"]({
    memory_name: "<memory_name>",
    content: "<content>",
    max_chars: 0
  });
