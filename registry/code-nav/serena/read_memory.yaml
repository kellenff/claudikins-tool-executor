name: read_memory
server: serena
category: code-nav
description: |-
  Reads the contents of a memory. Should only be used if the information
  is likely to be relevant to the current task, inferring relevance from the memory name.
inputSchema:
  type: object
  properties:
    memory_name:
      title: Memory Name
      type: string
  required:
    - memory_name
  title: applyArguments
example: |-
  await serena["read_memory"]({
    memory_name: "<memory_name>"
  });
