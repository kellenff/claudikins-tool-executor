name: rename_memory
server: serena
category: code-nav
description: |-
  Rename or move a memory, use "/" in the name to organize into topics.
  The "global" topic should only be used if explicitly instructed.
inputSchema:
  type: object
  properties:
    old_name:
      title: Old Name
      type: string
    new_name:
      title: New Name
      type: string
  required:
    - old_name
    - new_name
  title: applyArguments
example: |-
  await serena["rename_memory"]({
    old_name: "<old_name>",
    new_name: "<new_name>"
  });
