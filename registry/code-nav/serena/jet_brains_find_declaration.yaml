name: jet_brains_find_declaration
server: serena
category: code-nav
description: Finds the declaration of a symbol.
inputSchema:
  type: object
  properties:
    relative_path:
      title: Relative Path
      type: string
      description: The relative path to the source file containing the symbol for which to find the declaration.
    regex:
      title: Regex
      type: string
      description: |-
        A regular expression with one group, where the group matches the symbol for which to perform the lookup.
        For example, to find the declaration of the `process` method in a call like `obj.process()`,
        pass an expression like "obj\.(process)\(process_input_arg=37\)".
        Prefer regexes with sufficiently large context around the group to render the match unambiguous.
        Uses Python syntax with MULTILINE and DOTALL flags enabled.
    include_body:
      default: false
      title: Include Body
      type: boolean
      description: Whether to include the symbol's body in the result. Default False.
  required:
    - relative_path
    - regex
  title: applyArguments
example: |-
  await serena["jet_brains_find_declaration"]({
    relative_path: "<relative_path>",
    regex: "<regex>",
    include_body: true
  });
