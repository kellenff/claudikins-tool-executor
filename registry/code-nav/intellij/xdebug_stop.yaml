name: xdebug_stop
server: intellij
category: code-nav
description: |-
  Terminates the PHP script immediately and ends the debug session.
  Use this when debugging a single script with xdebug_single_file.
inputSchema:
  type: object
  properties:
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required: []
example: |-
  await intellij["xdebug_stop"]({
    projectPath: "<projectPath>"
  });
