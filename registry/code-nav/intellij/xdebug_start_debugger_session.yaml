name: xdebug_start_debugger_session
server: intellij
category: code-nav
description: >-
  Start a debugger session for either an existing run configuration by name or a code location

  (`filePath` + `line`) in the current project.

  Use this tool to start a debugger session.

  Use this tool with either an existing run configuration name, or with `filePath` + `line`.

  When using `filePath` + `line`, a line with a runnable method such as `main`, a test, or another executable

  entry point will almost always work. If you are unsure which line to use, `get_run_configurations`

  can help discover runnable locations in the file.

  The session will be started and you can then use other debugger tools to control execution.


  Preconditions:

  - When using `configurationName`, pass the exact existing run configuration name; do not pass a test method name or
  other derived target identifier.

  - When using `filePath` + `line`, point at a runnable code location such as `main`, a test, or another executable
  entry point.

  - Set at least one breakpoint first; otherwise the program may run to completion without pausing.

  - Pass either `configurationName`, or `filePath` together with `line`. These modes are mutually exclusive.


  Behavior:

  - Waits for session creation up to `timeout`.

  - Applies a grace wait (`graceWaitMs`) after the session starts and returns refreshed state.

  - Optional launch overrides (`programArguments`, `workingDirectory`, `envs`) are applied only for this debug launch
  and are not persisted.

  - `get_run_configurations` is the source of truth for override support: only pass launch overrides when the selected
  run configuration reports `supportsDynamicLaunchOverrides=true`.

  - Do not pass these override parameters unless you explicitly need to change the configured launch values for this
  debug launch.

  - Missing/null override parameters keep existing run configuration values unchanged.

  - For string overrides (`programArguments`, `workingDirectory`), missing/null or empty string (`""`) keeps the
  existing value unchanged.

  - Pass a whitespace-only string such as `" "` to clear an existing value for this debug launch.


  Next call:

  - `xdebug_control_session(action=WAIT_FOR_PAUSE)` to wait for first suspension.

  - After pause, call `xdebug_get_stack` and `xdebug_get_frame_values` (or `xdebug_evaluate_expression`) for runtime
  evidence.


  Returns a flat result with debugger session metadata plus the execution snapshot fields from the launch:

  - `sessionId`, `name`, `status`, and optional `runConfigurationName`

  - `output` preview and optional `fullOutputPath`

  - optional `exitCode` when process termination is already known
inputSchema:
  type: object
  properties:
    configurationName:
      type: string
      description: Name of the existing run configuration to debug.
    filePath:
      type: string
      description: File path relative to the project root. Provide together with `line` to start debugging from a code location.
    line:
      type: integer
      description: >-
        1-based line number for `filePath`. Provide together with `filePath` and do not combine with
        `configurationName`.
    timeout:
      type: integer
      description: 'Timeout in milliseconds to wait for the debug session to start. Default: 60000.'
    graceWaitMs:
      type: integer
      description: 'Grace wait in milliseconds after session starts to refresh state. Default: 2000.'
    programArguments:
      type: string
      description: >-
        Optional program arguments override for this launch only. Pass this only when the selected run configuration
        reports `supportsDynamicLaunchOverrides=true` in `get_run_configurations`. Missing/null or empty string keeps
        the existing value; whitespace-only string clears it.
    workingDirectory:
      type: string
      description: >-
        Optional working directory override for this launch only. Pass this only when the selected run configuration
        reports `supportsDynamicLaunchOverrides=true` in `get_run_configurations`. Missing/null or empty string keeps
        the existing value; whitespace-only string clears it.
    envs:
      type: object
      additionalProperties:
        type: string
      description: >-
        Optional environment variable overrides for this launch only. Pass this only when the selected run configuration
        reports `supportsDynamicLaunchOverrides=true` in `get_run_configurations`. Missing/null keeps existing env
        unchanged; when provided, values are merged over existing env.
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required: []
example: |-
  await intellij["xdebug_start_debugger_session"]({
    configurationName: "<configurationName>",
    filePath: "<filePath>",
    line: 0
  });
