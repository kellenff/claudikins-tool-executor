name: create_new_file
server: intellij
category: code-nav
description: >-
  Creates a new file at the specified path within the project directory and optionally populates it with text if
  provided.

  Use this tool to generate new files in your project structure.

  Note: Creates any necessary parent directories automatically
inputSchema:
  type: object
  properties:
    pathInProject:
      type: string
      description: Path where the file should be created relative to the project root
    text:
      type: string
      description: Content to write into the new file
    overwrite:
      type: boolean
      description: Whether to overwrite an existing file if exists. If false, an exception is thrown in case of a conflict.
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - pathInProject
example: |-
  await intellij["create_new_file"]({
    pathInProject: "<pathInProject>",
    text: "<text>",
    overwrite: true
  });
