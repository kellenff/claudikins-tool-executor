name: xdebug_step_into
server: intellij
category: code-nav
description: |-
  Steps into the next function call. The session pauses at the first line
  of the called function. Use xdebug_stack and xdebug_context to inspect.
inputSchema:
  type: object
  properties:
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required: []
example: |-
  await intellij["xdebug_step_into"]({
    projectPath: "<projectPath>"
  });
