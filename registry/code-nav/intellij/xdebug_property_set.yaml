name: xdebug_property_set
server: intellij
category: code-nav
description: |-
  Changes the value of a variable in the current scope.
  Only available when paused at a breakpoint.
inputSchema:
  type: object
  properties:
    name:
      type: string
      description: Variable name, e.g. "$myVar"
    value:
      type: string
      description: New value as a PHP literal, e.g. "42", "\"hello\"", "true"
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - name
    - value
example: |-
  await intellij["xdebug_property_set"]({
    name: "<name>",
    value: "<value>",
    projectPath: "<projectPath>"
  });
