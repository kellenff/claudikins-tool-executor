name: get_file_text_by_path
server: intellij
category: code-nav
description: |2-
          Retrieves the text content of a file using its path relative to project root.
          Use this tool to read file contents when you have the file's project-relative path.
          In the case of binary files, the tool returns an error.
          If the file is too large, the text will be truncated with '<<<...content truncated...>>>' marker and in according to the `truncateMode` parameter.
inputSchema:
  type: object
  properties:
    pathInProject:
      type: string
      description: Path relative to the project root
    truncateMode:
      type: string
      enum:
        - START
        - MIDDLE
        - END
        - NONE
      description: 'How to truncate the text: from the start, in the middle, at the end, or don''t truncate at all'
    maxLinesCount:
      type: integer
      description: Max number of lines to return. Truncation will be performed depending on truncateMode.
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - pathInProject
example: |-
  await intellij["get_file_text_by_path"]({
    pathInProject: "<pathInProject>",
    truncateMode: "<truncateMode>",
    maxLinesCount: 0
  });
