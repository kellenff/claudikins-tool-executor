name: xdebug_control_session
server: intellij
category: code-nav
description: >-
  Controls the execution of a debug session.

  Use this tool to step through code, resume execution, pause, or stop the debug session.


  Preconditions:

  - A debug session must exist.

  - `STEP_*` and `RESUME` require a suspended session.


  Actions:

  - STEP_INTO: Step into the next method call

  - STEP_OVER: Step over the current line

  - STEP_OUT: Step out of the current method

  - RESUME: Resume program execution until the next breakpoint

  - PAUSE: Pause program execution

  - STOP: Stop the debug session

  - WAIT_FOR_PAUSE: Wait until the session pauses (breakpoint hit or paused manually)

  - DRAIN_EVENTS: Drain tracepoint outputs for the session (breakpoint errors are drained for all actions)


  Important notes:

  - If the program is running, use WAIT_FOR_PAUSE or PAUSE before STEP_* / RESUME.

  - Use a current `sessionId` from `xdebug_get_debugger_status` or `xdebug_start_debugger_session`. If a session stops,
  times out, or disappears, refresh the session list before the next session-scoped call.

  - RESUME does NOT set breakpoints. If there are no enabled breakpoints (or none will be hit next), the program may run
  to completion and the session may stop without pausing.

  - After RESUME, call WAIT_FOR_PAUSE to confirm the next suspension. If WAIT_FOR_PAUSE times out, consider PAUSE and
  re-check breakpoints.

  - `DRAIN_EVENTS` also requires an existing session; do not reuse a stale `sessionId` after the session has terminated.


  Next call:

  - After `RESUME`, call `xdebug_control_session(action=WAIT_FOR_PAUSE)`.

  - After a paused result, call `xdebug_get_stack` / `xdebug_get_frame_values` / `xdebug_evaluate_expression`.


  Status values in the result:

  - running: Program is executing

  - paused: Execution is suspended (breakpoint, step, or manual pause); paused results also include `frameValues`, a
  current-frame snapshot in `xdebug_get_frame_values(depth=0)` format when available

  - stopped: Debug session has terminated

  - `breakpointErrorsTail` is returned for any action

  - `tracepointOutputsTail` is returned only for `DRAIN_EVENTS`


  Event support scope:

  - Breakpoint error and tracepoint output events are currently reported only by JVM-based debuggers (Java, Kotlin,
  etc.).

  - On other debugger backends these event tails can be empty even when breakpoints/logging are configured.
inputSchema:
  type: object
  properties:
    sessionId:
      type: string
      description: >-
        Debug session ID. Use the current ID returned by `xdebug_get_debugger_status` or
        `xdebug_start_debugger_session`. If a session has stopped, timed out, or disappeared, refresh the session list
        before reusing an old ID. Format: uses session name as ID by default; if multiple sessions share the same name,
        ID is `<sessionName>#<executionId>`. If null and exactly one active session exists, it is selected
        automatically. If multiple sessions are active and sessionId is omitted, the call fails. Default: null.
    action:
      type: string
      enum:
        - STEP_INTO
        - STEP_OVER
        - STEP_OUT
        - RESUME
        - PAUSE
        - STOP
        - WAIT_FOR_PAUSE
        - DRAIN_EVENTS
      description: >-
        Action to perform: STEP_INTO, STEP_OVER, STEP_OUT, RESUME, PAUSE, STOP, WAIT_FOR_PAUSE, DRAIN_EVENTS. Event
        draining is currently populated only by JVM-based debuggers (Java, Kotlin, etc.).
    timeout:
      type: integer
      description: >-
        Timeout in milliseconds to wait for action completion. Guidance: STEP_* / PAUSE usually 5000-15000;
        WAIT_FOR_PAUSE usually 30000-120000 depending on workload and breakpoints. Default: 30000.
    eventsLimit:
      type: integer
      description: >-
        Maximum number of latest events to drain per event list. For DRAIN_EVENTS this limit is applied independently to
        breakpointErrorsTail and tracepointOutputsTail. Default: 100.
    clearEventsAfterRead:
      type: boolean
      description: Compatibility flag. Returned events are always removed from internal buffers, regardless of this value.
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - action
example: |-
  await intellij["xdebug_control_session"]({
    sessionId: "<sessionId>",
    action: "<action>",
    timeout: 0
  });
