name: search_symbol
server: intellij
category: code-nav
description: |-
  Searches for symbols (classes, methods, fields).
  Use this tool for semantic lookup by identifier fragments.
  Results include match coordinates when available (1-based line/column, 0-based offsets).

  Paths are glob patterns relative to the project root.
  By default this searches project symbols only.
  If you don't find a suitable result, try again with include_external=true to search SDK and library symbols too.
inputSchema:
  type: object
  properties:
    q:
      type: string
      description: Symbol query text
    paths:
      type: array
      items:
        type: string
      description: >-
        Optional list of project-relative glob patterns to filter results. Supports '!' excludes. Trailing '/' expands
        to '**'. Patterns without '/' are treated as '**/pattern'. Empty strings are ignored.
    include_external:
      type: boolean
      description: >-
        Whether to include SDK and library symbols. Disabled by default; if nothing suitable is found, try again with
        include_external=true.
    limit:
      type: integer
      description: Maximum number of results to return
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - q
example: |-
  await intellij["search_symbol"]({
    q: "<q>",
    paths: [],
    include_external: true
  });
