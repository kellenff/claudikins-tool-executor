name: search_ide_actions
server: intellij
category: code-nav
description: |-
  Searches for IDE actions by text query.
  Use this to discover available actions before calling invoke_ide_action.
inputSchema:
  type: object
  properties:
    query:
      type: string
      description: Text to search for in action ID, name, and description (case-insensitive substring match)
    limit:
      type: integer
      description: Maximum number of results to return (default 50)
    includeGroups:
      type: boolean
      description: Whether to include action groups in results (default false)
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - query
example: |-
  await intellij["search_ide_actions"]({
    query: "<query>",
    limit: 0,
    includeGroups: true
  });
