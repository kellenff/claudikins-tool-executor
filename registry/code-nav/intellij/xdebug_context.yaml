name: xdebug_context
server: intellij
category: code-nav
description: |-
  Returns all variables in scope at the given stack depth (default: 0 = current frame).
  Includes locals and superglobals. Only available when paused at a breakpoint.
inputSchema:
  type: object
  properties:
    stackDepth:
      type: integer
      description: 'Stack depth to inspect (default: 0 = current frame)'
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required: []
example: |-
  await intellij["xdebug_context"]({
    stackDepth: 0,
    projectPath: "<projectPath>"
  });
