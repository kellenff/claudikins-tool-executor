name: preview_table_data
server: intellij
category: code-nav
description: |-
  Previews data of the table, view, materialized view or other table-like object using given database connection.
  Do not use this tool for DDL data sources as they have no underlying DBMS connection.
  Returns table content in CSV format
inputSchema:
  type: object
  properties:
    connectionId:
      type: string
      description: The unique ID of a database connection.
    databaseName:
      type: string
      description: >-
        Name of the database the schema belongs to. Might be empty if DBMS has no databases, but only schemas.

        Together with `schemaName` property forms qualified schema name that uniquely identifies the schema within the
        connection.
    schemaName:
      type: string
      description: Name of the schema.
    tableName:
      type: string
      description: Name of the table.
    maxRowCount:
      type: integer
      description: Maximum number of rows to return. Default is 100. You must NOT pass zero or negative value for this argument.
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - connectionId
    - databaseName
    - schemaName
    - tableName
example: |-
  await intellij["preview_table_data"]({
    connectionId: "<connectionId>",
    databaseName: "<databaseName>",
    schemaName: "<schemaName>"
  });
