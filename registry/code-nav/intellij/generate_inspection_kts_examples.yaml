name: generate_inspection_kts_examples
server: intellij
category: code-nav
description: |2-
      Returns example inspection.kts templates for the target language to guide code generation.
      Provides XML-wrapped examples showing how to write inspections using the InspectionKts API.
inputSchema:
  type: object
  properties:
    language:
      type: string
      description: 'Target language for examples: ''Java'', ''Kotlin'', or ''Any'' (default)'
    includeAdditionalExamples:
      type: boolean
      description: If true, includes additional curated examples besides templates
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required: []
example: |-
  await intellij["generate_inspection_kts_examples"]({
    language: "<language>",
    includeAdditionalExamples: true,
    projectPath: "<projectPath>"
  });
