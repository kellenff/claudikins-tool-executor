name: runNotebookCell
server: intellij
category: code-nav
description: |2-
        Execute one or all cells of a Jupyter notebook.
        Parameters:
        - file_path: absolute path to a .ipynb file.
        - cell_id (optional): Jupyter cell ID hash (string). If omitted, the entire notebook will be executed.
        Notes:
        - This action runs inside the IDE on the file specified by file_path.
        - If the file cannot be found, the action returns an error.
        Examples:
        - {"file_path": "/abs/path/demo.ipynb", "cell_id": "13c5cec416369e19"}
        - {"file_path": "/abs/path/demo.ipynb"}
inputSchema:
  type: object
  properties:
    file_path:
      type: string
      description: Absolute path to the .ipynb notebook
    cell_id:
      type: string
      description: Optional Jupyter cell ID. If omitted, all cells are executed.
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - file_path
example: |-
  await intellij["runNotebookCell"]({
    file_path: "<file_path>",
    cell_id: "<cell_id>",
    projectPath: "<projectPath>"
  });
