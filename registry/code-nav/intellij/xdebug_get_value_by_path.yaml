name: xdebug_get_value_by_path
server: intellij
category: code-nav
description: |-
  Gets the value of a nested object by following a path of property names.
  Use this tool to drill down into complex objects and inspect their nested properties.

  Preconditions:
  - Session must be suspended.
  - Path must be non-empty and refer to names visible in the selected frame/object.

  The result is returned as:
  - depth == 0: just the presentation of the value at the specified path
  - depth > 0: the presentation of the value plus a pseudo-graphics tree of its children up to the requested depth

  Example: To get the value of obj.field.subField, use path = ["obj", "field", "subField"].
  For array/list indexers, pass the index token as a regular path element (child name), e.g.
  items[0].name -> path = ["items", "[0]", "name"].
  Use exact child names from the current paused `xdebug_get_frame_values` / previous `xdebug_get_value_by_path` output
  because index node names may differ by language/debugger (for example, "[0]" vs "0").
  Refresh `path` tokens after `RESUME`, `STEP_*`, `xdebug_run_to_line`, or any other change in paused location.

  Next call:
  - Use another `xdebug_get_value_by_path` call to continue drilling deeper.
  - Use `xdebug_evaluate_expression` when direct name-path navigation is insufficient.
inputSchema:
  type: object
  properties:
    sessionId:
      type: string
      description: >-
        Debug session ID. Use the current ID returned by `xdebug_get_debugger_status` or
        `xdebug_start_debugger_session`. If a session has stopped, timed out, or disappeared, refresh the session list
        before reusing an old ID. Format: uses session name as ID by default; if multiple sessions share the same name,
        ID is `<sessionName>#<executionId>`. If null and exactly one active session exists, it is selected
        automatically. If multiple sessions are active and sessionId is omitted, the call fails. Default: null.
    frameIndex:
      type: integer
      description: >-
        Stack frame index as integer (0 = top frame). Obtain this from the current paused `xdebug_get_stack` result; do
        not reuse a cached frame index after `RESUME`, `STEP_*`, `xdebug_run_to_line`, or any change in paused location.
        If null, uses the top frame. Default: null.
    path:
      type: array
      items:
        type: string
      description: >-
        List of child names to navigate through, e.g. ['myObject', 'field', 'subField'] or ['items', '[0]', 'name']. Use
        exact node names from the current paused `xdebug_get_frame_values` / `xdebug_get_value_by_path` output and
        refresh stale path tokens after the paused location changes.
    depth:
      type: integer
      description: >-
        Maximum depth for expanding children of the resolved value (0 = value only, 1 = immediate children, 2 = children
        + grandchildren, etc.). Default: 0.
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - path
example: |-
  await intellij["xdebug_get_value_by_path"]({
    sessionId: "<sessionId>",
    frameIndex: 0,
    path: []
  });
