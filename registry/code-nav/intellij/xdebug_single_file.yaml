name: xdebug_single_file
server: intellij
category: code-nav
description: |-
  Starts an xdebug session for a single PHP script.
  Please analyze the response and give the user result in plain text.
inputSchema:
  type: object
  properties:
    path:
      type: string
      description: Absolute path to the PHP script to debug
    projectPath:
      type: string
      description: |2-
         The project path. Pass this value ALWAYS if you are aware of it. It reduces numbers of ambiguous calls. 
         In the case you know only the current working directory you can use it as the project path.
         If you're not aware about the project path you can ask user about it.
  required:
    - path
example: |-
  await intellij["xdebug_single_file"]({
    path: "<path>",
    projectPath: "<projectPath>"
  });
