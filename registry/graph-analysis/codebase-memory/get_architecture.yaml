name: get_architecture
server: codebase-memory
category: graph-analysis
description: Get high-level architecture overview — packages, services, dependencies, and project structure at a glance.
inputSchema:
  type: object
  properties:
    project:
      type: string
    aspects:
      type: array
      items:
        type: string
  required:
    - project
example: |-
  await codebase_memory["get_architecture"]({
    project: "<project>",
    aspects: []
  });
