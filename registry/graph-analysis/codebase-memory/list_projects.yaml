name: list_projects
server: codebase-memory
category: graph-analysis
description: |
  List all indexed projects with their node and edge counts.

  Useful to:
  - Confirm a project has been indexed
  - Compare relative graph sizes across projects
  - Discover project names usable as the prefix in qualified names
    (see get_code_snippet)
inputSchema:
