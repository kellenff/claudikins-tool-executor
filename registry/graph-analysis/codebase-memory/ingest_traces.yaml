name: ingest_traces
server: codebase-memory
category: graph-analysis
description: Ingest runtime traces to enhance the knowledge graph
inputSchema:
  type: object
  properties:
    traces:
      type: array
      items:
        type: object
    project:
      type: string
  required:
    - traces
    - project
example: |-
  await codebase-memory["ingest_traces"]({
    traces: [],
    project: "<project>"
  });
