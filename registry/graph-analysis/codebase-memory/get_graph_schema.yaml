name: get_graph_schema
server: codebase-memory
category: graph-analysis
description: Get the schema of the knowledge graph (node labels, edge types)
inputSchema:
  type: object
  properties:
    project:
      type: string
  required:
    - project
example: |-
  await codebase-memory["get_graph_schema"]({
    project: "<project>"
  });
