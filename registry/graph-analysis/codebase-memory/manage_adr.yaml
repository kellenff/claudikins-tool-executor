name: manage_adr
server: codebase-memory
category: graph-analysis
description: Create or update Architecture Decision Records
inputSchema:
  type: object
  properties:
    project:
      type: string
    mode:
      type: string
      enum:
        - get
        - update
        - sections
    content:
      type: string
    sections:
      type: array
      items:
        type: string
  required:
    - project
example: |-
  await codebase-memory["manage_adr"]({
    project: "<project>",
    mode: "<mode>",
    content: "<content>"
  });
