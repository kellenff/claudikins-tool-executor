name: query_graph
server: codebase-memory
category: graph-analysis
description: >-
  Execute a Cypher query against the knowledge graph for complex multi-hop patterns, aggregations, and cross-service
  analysis.
inputSchema:
  type: object
  properties:
    query:
      type: string
      description: Cypher query
    project:
      type: string
    max_rows:
      type: integer
      description: 'Optional row limit. Default: unlimited (100k ceiling)'
  required:
    - query
    - project
example: |-
  await codebase_memory["query_graph"]({
    query: "<query>",
    project: "<project>",
    max_rows: 0
  });
